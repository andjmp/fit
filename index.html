// ── Rest timer ────────────────────────────────────────────────────────────────
function parseRestSecs(rest){
  if(!rest||rest==="—") return 0;
  const m=rest.match(/(\d+)[\s–-]+(\d+)\s*min/); if(m) return parseInt(m[1])*60;
  const s=rest.match(/(\d+)\s*min/); if(s) return parseInt(s[1])*60;
  const sec=rest.match(/(\d+)\s*sec/); if(sec) return parseInt(sec[1]);
  return 0;
}

function RestTimer({restStr,color}){
  const total=parseRestSecs(restStr);
  const [state,setState]=useState("idle");
  const [elapsed,setElapsed]=useState(0);
  const iv=useRef(null);
  const start=()=>{setState("running");setElapsed(0);iv.current=setInterval(()=>setElapsed(e=>{if(e+1>=total){clearInterval(iv.current);setState("done");return total;}return e+1;}),1000);};
  const reset=()=>{clearInterval(iv.current);setState("idle");setElapsed(0);};
  useEffect(()=>()=>clearInterval(iv.current),[]);
  if(!total) return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0a0a18",borderRadius:8,padding:"10px 14px",marginBottom:14}}><span style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600}}>REST</span><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:"#666680"}}>—</span></div>;
  const pct=elapsed/total,rem=total-elapsed,mins=Math.floor(rem/60),secs=rem%60;
  const ts=mins>0?`${mins}:${secs.toString().padStart(2,"0")}`:rem+"s";
  return <button onClick={state==="idle"?start:reset} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#141428",borderRadius:8,padding:"10px 14px",marginBottom:14,width:"100%",border:"none",cursor:"pointer",overflow:"hidden",position:"relative"}}>
    {state!=="idle"&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct*100}%`,background:state==="done"?color:"#E67E22",transition:state==="running"?"width 1s linear":"none",borderRadius:8}}/>}
    <span style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600,position:"relative",zIndex:1}}>REST</span>
    <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:color,position:"relative",zIndex:1}}>{state==="idle"?restStr:state==="done"?"done":ts}</span>
  </button>;
}

// Daily tips [weekIndex][dayIndex]
const DAILY_TIPS=[
  ["Rest day. Muscles grow during recovery, not during workouts. Tonight's sleep matters more than any extra set.","Progressive overload is the whole game. If you lifted the same weight for the same reps as last week, you maintained — not gained. Always try to add something small.","Easy run pace: if you finish feeling like you could have gone faster, you nailed it. If you're winded, you went too hard.","Pull-up tip: at the top of each rep, try to pull your elbows toward your hips rather than just pulling your chin to the bar. More lat, less arm.","Bulgarian split squat tip: lean your torso slightly forward about 10–15 degrees. Shifts more load to the glute and improves stability.","Protein timing matters less than protein total. Just hit your daily target however works for you.","Test day. Do push-up test fresh, before the gym. Wait 2–3 hours after gym before testing push-ups."],
  ["Week 2. Your body is adapting to new stress — more tired than week 1 is normal. That's the adaptation process working.","Double progression: hit all target reps cleanly before adding weight. Chasing heavier weight with sloppy form is how progress stalls.","On run days, resist the urge to push pace. The aerobic base you're building now pays off in weeks 6–10.","The drop-off in pull-up reps across sets is expected. Quality over matching your first set. Sets 3–4 being lower is fine.","Ankle mobility drill: stand facing a wall, toes 3 inches away, touch knee to wall without heel lifting. 10 each side.","If you're under on calories, add a tablespoon of peanut butter or olive oil to a meal. Easy 100–120 calories with no extra volume.","Weigh yourself first thing in the morning, same conditions every week. That's your real number."],
  ["Two weeks in. The initial soreness should be fading. That's adaptation, not a sign you're not working hard enough.","Try to add one extra rep or a small amount of weight to at least one exercise this week. Small wins compound over 10 weeks.","You're at 2.5 miles this week. Halfway to race distance. The second half of the build will feel easier than the first.","Dead hangs after pull-up sets build grip strength and decompress the spine. Keep doing them.","Pistol squat check: is the movement getting less wobbly? The first few weeks are mostly balance adaptation.","Sleep is your most underrated performance tool. Chronic under-sleeping stalls strength gains more than any training variable.","Look at your week 1 numbers and compare. Even 1–2 rep improvements are real progress."],
  ["A month in. You've built a real streak. Four weeks of consistent training is something most people never sustain.","Week 4 is when training starts feeling routine rather than novel. That's ideal — you want it to feel automatic.","Tempo run tip: a pace where you could sing but only one word at a time is your 75% effort sweet spot.","Focus on full range of motion on pull-ups. Dead hang at the bottom, chin clearly over bar at the top. Partial reps build partial strength.","Your squat depth should be consistent by now. Focus on keeping weight through your whole foot, not just your toes.","Hydration affects strength more than most people realize. Even mild dehydration reduces performance noticeably.","Four weeks of data. Look at the trend, not just this week's number."],
  ["Week 5. The initial excitement has worn off but you haven't reached the finish line. This is where consistency is built.","If daily push-up sets are feeling easier, that's the signal to increase reps, not to slack off.","You've run over 15 miles total across this program. Your aerobic base is meaningfully stronger than 5 weeks ago.","Scapular shrug warmup before pull-ups: hang from bar and pull shoulder blades down without bending elbows, 10 reps. Activates lats before arms take over.","The Bulgarian split squat should feel significantly more controlled than week 1. That's real strength.","Pre-workout meal: 60–90 minutes before is the sweet spot. Too close and you feel heavy; too far and you feel empty.","Five weeks of data. Consistent trends matter more than any single week's number."],
  ["Six weeks in. You're building on a real foundation now.","Film yourself doing squats or pull-ups from the side this week. You'll catch form issues you can't feel.","Four miles this week. You're at 65% of full run distance. The 10K is a question of when, not if.","If pull-up reps are growing, start keeping 1–2 reps in reserve on set 1. More total volume across the session.","Single leg balance practice: stand on one leg while brushing teeth. Switch legs. It adds up.","Liquid calories help on days when eating feels like a chore — shakes, whole milk, smoothies with nut butter.","Six weeks of splits. Note which goals are consistently green and which are red. That's your focus area."],
  ["Seven weeks. Three to go. This is when people start coasting. Don't.","Gains now come purely from progressive overload. Pick one variable to push each session — weight, reps, or density.","4.5 miles this week. One more mile and you could walk the second half of a 10K. You won't need to.","Try a 2-second pause at the dead hang between pull-up reps. Full extension at the bottom is a commonly skipped range.","Eyes-closed single leg balance: dramatically harder than eyes open. Trains proprioception directly relevant to pistol squats.","Exhale on the exertion phase of every exercise. Inhale on the way down, exhale on the push or pull.","Week 7 test. Your numbers should show a clear upward trend from week 1."],
  ["Week 8. Two weeks left. Focus shifts from building to peaking.","Quality over quantity this week. Perfect reps matter more than grinding out ugly extras.","Five miles this week. Your longest run of the program — take it slow and just finish it.","Pull-up volume near its peak. Make sure you're eating enough — under-eating is the silent killer of late-program strength progress.","Try calf raises on a step with full heel drop below the step level. Dramatically harder and more effective.","You should have a clear sense of your weak links by now. That's your post-program priority list.","Week 8 test. Nearly there."],
  ["Second-to-last rest day. Your body knows what it's doing now. Trust it.","Don't add new exercises this week. Consistency and execution quality are the only variables worth controlling now.","5.5 miles this week. If you finish this run, you can run a 10K.","Final push on pull-ups. Whatever your max unassisted set is right now is roughly your ceiling for the end of the program.","Pistol squat check: can you do an unassisted attempt? Even a wobbly one counts. The first one opens the neural pathway.","Keep protein high even if overall calories dip slightly. Muscle isn't going anywhere in one week of slightly lower calories.","One more week. Your final numbers next Saturday will be your benchmark for the next phase."],
  ["Final rest day. You've done the work.","Last week. No heroics — execute what you've been doing and let the results speak.","Keep the run short and easy this week. Save your legs. The fitness is built.","Final pull-up session. Leave something in the tank for the end-of-program test.","Last leg day. Maintenance session — don't grind. Healthy joints matter for what comes next.","Eat well, stay hydrated, nothing new this week. Familiar foods, good sleep.","End of program test day. Whatever you log today is what 10 weeks of consistent work looks like."],
];

// ── Exercise overlay ──────────────────────────────────────────────────────────
function ExOverlay({ex,workout,repChecked,onRepCheck,onClose,onAllDone}){
  const d=EX_DETAILS[ex.id]; if(!d) return null;
  const totalSets=d.sets.length;
  const allSetsDone=totalSets>0&&d.sets.every((_,si)=>repChecked[`${ex.id}_s${si}`]);
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
    <div style={{background:"#0f0f1e",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:560,maxHeight:"88vh",overflowY:"auto",animation:"slideUp .25s ease both"}} onClick={e=>e.stopPropagation()}>
      <div style={{height:4,background:workout.color,borderRadius:"16px 16px 0 0"}}/>
      <div style={{padding:"16px 18px 40px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:"#fff",lineHeight:1.2}}>{ex.text}</div>
            <div style={{fontSize:10,color:"#666680",letterSpacing:1,marginTop:2}}>{workout.label}</div>
          </div>
          <button onClick={onClose} style={{background:"#1a1a2e",border:"none",borderRadius:"50%",width:30,height:30,color:"#666",fontSize:14,cursor:"pointer",flexShrink:0}}>x</button>
        </div>
        {d.weight&&d.weight!=="—"&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#14120a",border:"1px solid #2a2200",borderRadius:8,padding:"10px 14px",marginBottom:12}}>
          <span style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600}}>WEIGHT</span>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#F1C40F"}}>{d.weight}</span>
        </div>}
        <div style={{fontSize:12,color:"#aaaaaa",lineHeight:1.6,background:"#080810",borderRadius:8,padding:"10px 12px",marginBottom:14}}>{d.notes}</div>
        <RestTimer restStr={d.rest} color={workout.color}/>
        {totalSets>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600,marginBottom:8}}>SETS — {d.sets.filter((_,si)=>repChecked[`${ex.id}_s${si}`]).length}/{totalSets} done</div>
          {d.sets.map((s,si)=>{
            const key=`${ex.id}_s${si}`,done=!!repChecked[key];
            return <button key={si} onClick={()=>onRepCheck(key)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:done?"#0d2a1a":"#0a0a18",border:`1px solid ${done?workout.color:"#1e1e35"}`,borderRadius:8,padding:"11px 14px",marginBottom:6,cursor:"pointer",transition:"all .15s"}}>
              <div style={{width:20,height:20,borderRadius:5,flexShrink:0,background:done?workout.color:"transparent",border:`2px solid ${done?workout.color:"#2e2e4e"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>{done&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>v</span>}</div>
              <span style={{flex:1,textAlign:"left",fontSize:13,color:done?"#5a5a6a":"#ccc",textDecoration:done?"line-through":"none"}}>{s.l}</span>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:done?"#3a3a5a":workout.color}}>{s.r}{typeof s.r==="number"?" reps":""}</span>
            </button>;
          })}
        </div>}
        <button onClick={()=>{onAllDone(ex.id);onClose();}} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:allSetsDone?workout.color:"#1e1e35",color:allSetsDone?"#fff":"#aaaaaa",fontFamily:"'IBM Plex Mono',monospace",fontSize:13,fontWeight:600,cursor:"pointer"}}>
          {allSetsDone?"Mark Complete":"Mark Complete"}
        </button>
      </div>
    </div>
  </div>;
}

// ── Nutrition graph ───────────────────────────────────────────────────────────
function NutritionGraph({weekData, weekLabel, isCurrent}){
  // weekData: array of 7 {cal, prot} or null for each day Sun-Sat
  const W=320, PL=36, PR=36, PT=10, PB=20;
  const H = isCurrent ? 160 : 52;
  const cW=W-PL-PR, cH=H-PT-PB;
  const numLines = isCurrent ? 5 : 1;

  // determine y scale — go up to max of goal or actual
  const maxCal = Math.max(CAL_GOAL, ...weekData.filter(Boolean).map(d=>d.cal||0)) * 1.05;
  const maxProt = Math.max(PROT_GOAL, ...weekData.filter(Boolean).map(d=>d.prot||0)) * 1.05;

  const xOf = i => PL + (i/6)*cW;
  const yOfCal = v => PT + cH - (v/maxCal)*cH;
  const yOfProt = v => PT + cH - (v/maxProt)*cH;

  const calPoints = weekData.map((d,i)=>d&&d.cal?{x:xOf(i),y:yOfCal(d.cal),v:d.cal,i}:null).filter(Boolean);
  const protPoints = weekData.map((d,i)=>d&&d.prot?{x:xOf(i),y:yOfProt(d.prot),v:d.prot,i}:null).filter(Boolean);
  const calPath = calPoints.length>1?calPoints.map((p,j)=>`${j===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" "):null;
  const protPath = protPoints.length>1?protPoints.map((p,j)=>`${j===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" "):null;

  const calGoalY = yOfCal(CAL_GOAL);
  const protGoalY = yOfProt(PROT_GOAL);

  return <div style={{background:"#0a0a16",borderRadius:isCurrent?12:8,border:"1px solid #1a1a2e",padding:isCurrent?"12px 8px 8px":"6px 8px",marginBottom:isCurrent?0:8}}>
    {isCurrent&&<div style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600,marginBottom:8,paddingLeft:PL}}>{weekLabel}</div>}
    {!isCurrent&&<div style={{fontSize:9,color:"#333",marginBottom:4,paddingLeft:PL}}>{weekLabel}</div>}
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block",margin:"0 auto"}}>
      {/* Grid lines */}
      {Array.from({length:numLines+1},(_,i)=>{
        const y=PT+(i/numLines)*cH;
        return <line key={i} x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1a1a2e" strokeWidth="1"/>;
      })}
      {/* Goal dotted lines */}
      <line x1={PL} y1={calGoalY} x2={W-PR} y2={calGoalY} stroke="#3498DB" strokeWidth="1" strokeDasharray="3,3" opacity="0.5"/>
      <line x1={PL} y1={protGoalY} x2={W-PR} y2={protGoalY} stroke="#E67E22" strokeWidth="1" strokeDasharray="3,3" opacity="0.5"/>
      {/* Y axis labels — current week only */}
      {isCurrent&&Array.from({length:numLines+1},(_,i)=>{
        const frac=1-(i/numLines);
        const calV=Math.round(maxCal*frac);
        const protV=Math.round(maxProt*frac);
        const y=PT+(i/numLines)*cH;
        return <g key={i}>
          <text x={PL-4} y={y+4} textAnchor="end" fill="#3a3a5a" fontSize="7" fontFamily="monospace">{calV>0?calV:""}</text>
          <text x={W-PR+4} y={y+4} textAnchor="start" fill="#3a3a5a" fontSize="7" fontFamily="monospace">{protV>0?protV:""}</text>
        </g>;
      })}
      {/* X axis day labels — current week only */}
      {isCurrent&&DAY_LABELS.map((d,i)=><text key={i} x={xOf(i)} y={H-4} textAnchor="middle" fill="#3a3a5a" fontSize="7" fontFamily="monospace">{d}</text>)}
      {/* Calorie line */}
      {calPath&&<path d={calPath} fill="none" stroke="#3498DB" strokeWidth={isCurrent?2:1.5} strokeLinecap="round" strokeLinejoin="round"/>}
      {isCurrent&&calPoints.map(p=><g key={p.i}>
        <circle cx={p.x} cy={p.y} r="3" fill="#3498DB" stroke="#0a0a16" strokeWidth="1.5"/>
        <text x={p.x} y={p.y-6} textAnchor="middle" fill="#3498DB" fontSize="7" fontFamily="monospace">{Math.round(p.v)}</text>
      </g>)}
      {/* Protein line */}
      {protPath&&<path d={protPath} fill="none" stroke="#E67E22" strokeWidth={isCurrent?2:1.5} strokeLinecap="round" strokeLinejoin="round"/>}
      {isCurrent&&protPoints.map(p=><g key={p.i}>
        <circle cx={p.x} cy={p.y} r="3" fill="#E67E22" stroke="#0a0a16" strokeWidth="1.5"/>
        <text x={p.x} y={p.y+14} textAnchor="middle" fill="#E67E22" fontSize="7" fontFamily="monospace">{Math.round(p.v)}</text>
      </g>)}
    </svg>
    {isCurrent&&<div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6}}>
      <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#3498DB"}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke="#3498DB" strokeWidth="2"/></svg>Calories</div>
      <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#E67E22"}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke="#E67E22" strokeWidth="2"/></svg>Protein</div>
      <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#444"}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke="#3498DB" strokeWidth="1" strokeDasharray="3,3" opacity="0.6"/></svg>Goal</div>
    </div>}
  </div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const today=DAYS[new Date().getDay()], isSaturday=today==="Saturday";
  const todayKey=dateKey();
  const todayDayIdx=new Date().getDay();

  const [tab,setTab]=useState(isSaturday?"progress":"today");
  const [checked,setChecked]=useState({});
  const [repChecked,setRepChecked]=useState({});
  const [actuals,setActuals]=useState({});
  const [currentWeek,setCurrentWeek]=useState(()=>{
    const fs=new Date("2026-05-27"),now=new Date();
    if(now<fs) return 1;
    return Math.min(10,Math.max(1,Math.floor((now-fs)/(7*24*60*60*1000))+1));
  });
  const [puSets,setPuSets]=useState(0);
  const [graphMetric,setGraphMetric]=useState("pushups");
  const [saveStatus,setSaveStatus]=useState("");
  const [overlay,setOverlay]=useState(null);
  const holdTimer=useRef(null);
  const loaded=useRef(false);

  // Nutrition state
  const [nutLog,setNutLog]=useState([]); // [{id,desc,cal,prot,time}]
  const [nutInput,setNutInput]=useState("");
  const [nutLoading,setNutLoading]=useState(false);
  const [nutError,setNutError]=useState("");
  const [allNutWeeks,setAllNutWeeks]=useState({}); // {weekKey: {dateKey: {cal,prot}}}

  // ── Storage load ─────────────────────────────────────────────────────────────
  useEffect(()=>{
    const a=LS.get("ft_actuals"); if(a) setActuals(a);
    const d=LS.get("ft_daily_"+todayKey);
    if(d){if(d.checked)setChecked(d.checked);if(d.repChecked)setRepChecked(d.repChecked);if(d.puSets!==undefined)setPuSets(d.puSets);}
    const nl=LS.get("ft_nutlog_"+todayKey); if(nl) setNutLog(nl);
    const nw=LS.get("ft_nutweeks"); if(nw) setAllNutWeeks(nw);
    loaded.current=true;
  },[]);

  useEffect(()=>{if(!loaded.current)return;if(Object.keys(actuals).length===0)return;setSaveStatus("saving");const t=setTimeout(()=>{LS.set("ft_actuals",actuals);setSaveStatus("saved");setTimeout(()=>setSaveStatus(""),1800);},600);return()=>clearTimeout(t);},[actuals]);
  useEffect(()=>{if(!loaded.current)return;const t=setTimeout(()=>{LS.set("ft_daily_"+todayKey,{checked,repChecked,puSets});},400);return()=>clearTimeout(t);},[checked,repChecked,puSets]);
  useEffect(()=>{if(!loaded.current)return;LS.set("ft_nutlog_"+todayKey,nutLog);
    // Update weekly nutrition summary
    const cal=nutLog.reduce((s,e)=>s+e.cal,0);
    const prot=nutLog.reduce((s,e)=>s+e.prot,0);
    const wk=weekKey(currentWeek);
    setAllNutWeeks(prev=>{
      const next={...prev,[wk]:{...(prev[wk]||{}),[todayKey]:{cal,prot}}};
      LS.set("ft_nutweeks",next);
      return next;
    });
  },[nutLog]);

  const workout=WORKOUTS[today];
  const puTarget=PU_WEEK_REPS[currentWeek-1];
  const doneCount=workout.exercises.filter(e=>checked[e.id]).length;
  const allDone=doneCount===workout.exercises.length&&(workout.skipPushups||puSets>=5);

  const setActual=(wk,key,val)=>setActuals(p=>({...p,[wk]:{...(p[wk]||{}),[key]:val===""?undefined:parseFloat(val)}}));
  const getDiff=(wk,key)=>{const a=actuals[wk]?.[key];return a===undefined?null:a-WEEKS[wk-1].goals[key];};
  const fmtDiff=(diff,key)=>{if(diff===null)return"—";const d=key==="run"||key==="weight"?1:0;return`${diff>=0?"+":""}${diff.toFixed(d)}`;};
  const diffColor=diff=>diff===null?"#555":diff>=0?"#2ECC71":"#E74C3C";
  const diffBg=diff=>diff===null?"#1a1a2a":diff>=0?"#0d2a1a":"#2a0d0d";
  const diffBorder=diff=>diff===null?"#333":diff>=0?"#2ECC71":"#E74C3C";

  const startHold=id=>{holdTimer.current=setTimeout(()=>setOverlay(id),450);};
  const endHold=()=>clearTimeout(holdTimer.current);

  const markAllSetsDone=exId=>{const d=EX_DETAILS[exId];if(!d)return;setChecked(p=>({...p,[exId]:true}));if(d.sets.length>0){const u={};d.sets.forEach((_,si)=>{u[`${exId}_s${si}`]=true;});setRepChecked(p=>({...p,...u}));}};
  useEffect(()=>{workout.exercises.forEach(ex=>{const d=EX_DETAILS[ex.id];if(!d||d.sets.length===0)return;if(d.sets.every((_,si)=>repChecked[`${ex.id}_s${si}`])&&!checked[ex.id])setChecked(p=>({...p,[ex.id]:true}));});},[repChecked]);

  const overlayEx=overlay?workout.exercises.find(e=>e.id===overlay):null;
  const tomorrowDay=DAYS[(new Date().getDay()+1)%7];
  const tomorrowWorkout=WORKOUTS[tomorrowDay];

  // Nutrition totals
  const totalCal=nutLog.reduce((s,e)=>s+e.cal,0);
  const totalProt=nutLog.reduce((s,e)=>s+e.prot,0);

  // Claude API nutrition lookup
  const lookupNutrition=async()=>{
    if(!nutInput.trim()) return;
    setNutLoading(true); setNutError("");
    setNutError("");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:300,
          system:"Respond with ONLY a raw JSON object. No markdown, no backticks, no extra text. Format: {cal:NUMBER,prot:NUMBER,desc:STRING}",
          messages:[{role:"user",content:nutInput.trim()}],
        }),
      });
      const rawText=await res.text();
      const data=JSON.parse(rawText);
      if(data.error) throw new Error(data.error.message);
      const text=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim();
      const jsonStart=text.indexOf("{");
      const jsonEnd=text.lastIndexOf("}")+1;
      if(jsonStart===-1) throw new Error("No JSON returned");
      const parsed=JSON.parse(text.slice(jsonStart,jsonEnd));
      const entry={id:Date.now(),desc:parsed.desc||nutInput.trim(),cal:Math.round(parsed.cal||0),prot:Math.round((parsed.prot||0)*10)/10,time:new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})};
      setNutLog(prev=>[...prev,entry]);
      setNutInput("");
    }catch(e){setNutError("Error: "+e.message);}
    setNutLoading(false);
  };

  // Build current week nutrition data for graph
  const currentWeekNutData=()=>{
    const wk=weekKey(currentWeek);
    const weekStart=new Date("2026-05-27");
    weekStart.setDate(weekStart.getDate()+(currentWeek-1)*7);
    return Array.from({length:7},(_,i)=>{
      const d=new Date(weekStart); d.setDate(d.getDate()+i);
      const dk=dateKey(d);
      if(dk===todayKey&&nutLog.length>0) return {cal:totalCal,prot:totalProt};
      return allNutWeeks[wk]?.[dk]||null;
    });
  };

  // Build previous weeks nutrition data
  const prevWeeksNutData=()=>{
    const weeks=[];
    for(let w=currentWeek-1;w>=Math.max(1,currentWeek-4);w--){
      const wk=weekKey(w);
      const weekStart=new Date("2026-05-27");
      weekStart.setDate(weekStart.getDate()+(w-1)*7);
      const data=Array.from({length:7},(_,i)=>{
        const d=new Date(weekStart); d.setDate(d.getDate()+i);
        return allNutWeeks[wk]?.[dateKey(d)]||null;
      });
      weeks.push({label:`Week ${w}`,data});
    }
    return weeks;
  };

  return <div style={{minHeight:"100vh",background:"#0a0a12",fontFamily:"'IBM Plex Mono',monospace",color:"#e8e8f0"}}>
    {overlayEx&&<ExOverlay ex={overlayEx} workout={workout} repChecked={repChecked} onRepCheck={key=>setRepChecked(p=>({...p,[key]:!p[key]}))} onClose={()=>setOverlay(null)} onAllDone={markAllSetsDone}/>}

    {/* Header */}
    <div style={{position:"sticky",top:0,zIndex:10,background:"rgba(10,10,18,.97)",backdropFilter:"blur(12px)",borderBottom:"1px solid #1a1a2e",padding:"14px 16px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,letterSpacing:3,color:"#fff"}}>
            <span style={{fontSize:20,filter:"drop-shadow(0 0 8px #E67E22)"}}>⚡</span>FITNESS TRACKER
          </div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,letterSpacing:4,color:"#333",marginTop:2,paddingLeft:28}}>10 WEEKS</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,letterSpacing:3,color:"#E67E22"}}>{today.toUpperCase()}</div>
          <div style={{fontSize:10,color:"#444",marginTop:2}}>{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
        </div>
      </div>
      <div style={{display:"flex"}}>
        {[["today","Today"],["progress",`Progress${isSaturday?" *":""}`],["nutrition","Nutrition"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px 6px",background:"transparent",border:"none",borderBottom:tab===id?"2px solid #E67E22":"2px solid transparent",color:tab===id?"#e8e8f0":"#444",fontFamily:"'IBM Plex Mono',monospace",fontSize:10,fontWeight:500,cursor:"pointer",letterSpacing:.5,transition:"all .2s"}}>{label}</button>
        ))}
      </div>
    </div>

    <div style={{padding:"18px 14px 48px",maxWidth:560,margin:"0 auto"}}>

      {/* TODAY TAB */}
      {tab==="today"&&<div className="fade">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:900,letterSpacing:3,padding:"3px 9px",borderRadius:4,color:"#fff",background:workout.color}}>{today.toUpperCase()}</span>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,letterSpacing:1,color:"#fff"}}>{workout.label}</span>
        </div>
        {allDone&&<div style={{background:"linear-gradient(90deg,#0d2a1a,#1a3d28)",border:"1px solid #2ECC71",borderRadius:8,padding:"10px 14px",color:"#2ECC71",fontWeight:600,fontSize:13,letterSpacing:1,marginBottom:16}}>Workout complete. Well done.</div>}

        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {workout.exercises.map((ex,i)=>{
            const d=EX_DETAILS[ex.id];
            const setsTotal=d?.sets.length||0,setsDone=d?.sets.filter((_,si)=>repChecked[`${ex.id}_s${si}`]).length||0;
            return <div key={ex.id} className="fade"
              style={{display:"flex",alignItems:"center",gap:10,background:checked[ex.id]?"#0a0e0a":"#0f0f1e",border:`1px solid ${checked[ex.id]?"#1a2a1a":"#1e1e35"}`,borderRadius:8,padding:"11px 12px",width:"100%",transition:"all .15s",userSelect:"none",animationDelay:`${i*50}ms`}}
              onTouchStart={()=>startHold(ex.id)} onTouchEnd={endHold} onTouchMove={endHold}
              onMouseDown={()=>startHold(ex.id)} onMouseUp={endHold} onMouseLeave={endHold}>
              <button onClick={e=>{e.stopPropagation();setChecked(p=>({...p,[ex.id]:!p[ex.id]}));}}
                style={{width:22,height:22,borderRadius:6,flexShrink:0,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s",background:checked[ex.id]?workout.color:"#0f0f1e",border:`2px solid ${checked[ex.id]?workout.color:"#2e2e4e"}`}}>
                {checked[ex.id]&&<span style={{color:"#fff",fontSize:12,fontWeight:700,lineHeight:1}}>v</span>}
              </button>
              <div style={{flex:1,minWidth:0}} onClick={()=>setChecked(p=>({...p,[ex.id]:!p[ex.id]}))}>
                <div style={{fontSize:13,lineHeight:1.4,color:checked[ex.id]?"#55556a":"#c8c8d8",textDecoration:checked[ex.id]?"line-through":"none"}}>{ex.text}</div>
                <div style={{display:"flex",gap:8,alignItems:"center",marginTop:2}}>
                  {d?.sets.length>0&&<span style={{fontSize:9,color:"#666680",letterSpacing:.5}}>{d.sets.length}x{d.sets[0].r}</span>}
                  {d?.weight&&d.weight!=="—"&&d.weight!=="Bodyweight"&&<span style={{fontSize:9,color:"#5a5020",letterSpacing:.3}}>· {d.weight}</span>}
                  {setsTotal>0&&setsDone>0&&<span style={{fontSize:9,color:setsDone===setsTotal?"#2ECC71":"#4a6a4a"}}>{setsDone}/{setsTotal}</span>}
                </div>
              </div>
              <button onClick={()=>setOverlay(ex.id)} style={{background:"#1a1a2e",border:"none",borderRadius:6,color:"#666680",width:28,height:28,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,paddingBottom:1}}>›</button>
            </div>;
          })}
        </div>
        <div style={{fontSize:10,color:"#2a2a3a",textAlign:"center",marginBottom:16,letterSpacing:.5}}>Tap › for details + rest timer · hold to open</div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:11,color:"#666680",letterSpacing:1,marginBottom:5}}>{doneCount} / {workout.exercises.length} complete</div>
          <div style={{height:4,background:"#1a1a2e",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,transition:"width .4s ease",width:`${(doneCount/workout.exercises.length)*100}%`,background:workout.color}}/></div>
        </div>

        {/* Push-up tracker */}
        <div style={{background:"#0f0f1e",border:"1px solid #2a1e0e",borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,gap:10}}>
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:700,letterSpacing:1,color:"#E67E22",marginBottom:3}}>Daily Push-Up Practice</div>
              <div style={{fontSize:11,color:"#666",lineHeight:1.4}}>{workout.skipPushups?"Skip today — push day conflicts":`${puTarget} reps per set · never to failure · Week ${currentWeek}`}</div>
            </div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,padding:"4px 12px",borderRadius:8,letterSpacing:1,flexShrink:0,background:puSets>=5?"#0d2a1a":"#1a1a2e",border:`1px solid ${puSets>=5?"#2ECC71":"#2e2e4e"}`,color:puSets>=5?"#2ECC71":"#888"}}>{puSets}/5</div>
          </div>
          {!workout.skipPushups&&<>
            <div style={{display:"flex",gap:10,justifyContent:"center",margin:"4px 0 6px"}}>
              {[1,2,3,4,5].map(n=><button key={n} className="pu-btn" onClick={()=>setPuSets(s=>s>=n?n-1:n)}
                style={{width:48,height:48,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .15s",flexShrink:0,background:puSets>=n?"#E67E22":"#1a1a2e",border:`2px solid ${puSets>=n?"#E67E22":"#2e2e4e"}`,boxShadow:puSets>=n?"0 0 10px #E67E2260":"none"}}>
                {puSets>=n?<span style={{color:"#fff",fontSize:13,fontWeight:700}}>v</span>:<span style={{color:"#3a3a5a",fontSize:12}}>{n}</span>}
              </button>)}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
              <div style={{fontSize:11,color:"#666680"}}>{puSets===0?"Tap a dot when you finish a set":puSets<5?`${5-puSets} set${5-puSets!==1?"s":""} to go`:"All 5 sets done"}</div>
              {puSets>0&&<button onClick={()=>setPuSets(0)} style={{background:"transparent",border:"1px solid #2e2e4e",borderRadius:5,color:"#666680",fontFamily:"'IBM Plex Mono',monospace",fontSize:10,padding:"3px 8px",cursor:"pointer"}}>Reset</button>}
            </div>
            <div style={{marginTop:10,fontSize:11,color:"#666680",background:"#0a0a18",borderRadius:6,padding:"7px 10px",lineHeight:1.5}}>
              <span style={{color:"#E67E22",fontWeight:600}}>Week {currentWeek}:</span> {puTarget} reps x 5 sets <span style={{color:"#55556a"}}>· stop 3–4 short of failure</span>
            </div>
          </>}
        </div>

        {/* Up Next */}
        <div style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderLeft:`3px solid ${tomorrowWorkout.color}`,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontSize:9,letterSpacing:2,color:"#666680",marginBottom:6,fontWeight:600}}>UP NEXT — {tomorrowDay.toUpperCase()}</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:"#fff",marginBottom:8}}>{tomorrowWorkout.label}</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {tomorrowWorkout.exercises.map(ex=>{const d=EX_DETAILS[ex.id];return <div key={ex.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"#aaaaaa"}}>{ex.text}</span>{d?.weight&&d.weight!=="—"&&<span style={{fontSize:10,color:"#F1C40F",opacity:.8}}>{d.weight}</span>}</div>;})}
          </div>
        </div>

        {/* Today's Tip */}
        <div style={{background:"#0a0a18",border:"1px solid #1a1a2e",borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontSize:9,letterSpacing:2,color:"#666680",fontWeight:600,marginBottom:8}}>TODAY'S TIP</div>
          <div style={{fontSize:13,color:"#c8c8d8",lineHeight:1.7}}>{getDailyTip(currentWeek)}</div>
        </div>

        {isSaturday&&<div style={{display:"flex",alignItems:"center",gap:12,background:"linear-gradient(90deg,#1a1500,#252000)",border:"1px solid #F1C40F",borderRadius:10,padding:"13px 14px",color:"#F1C40F",fontSize:13}}>
          <div style={{flex:1}}><div style={{fontWeight:700,marginBottom:2}}>Saturday — Test Day</div><div style={{fontSize:12,opacity:.85}}>Log your results in the Progress tab.</div></div>
          <button onClick={()=>setTab("progress")} style={{background:"#F1C40F",color:"#0a0a00",border:"none",borderRadius:6,padding:"7px 12px",fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",marginLeft:"auto"}}>Log Now</button>
        </div>}
      </div>}

      {/* PROGRESS TAB */}
      {tab==="progress"&&<div className="fade">
        {isSaturday&&<div style={{display:"flex",alignItems:"center",gap:12,background:"linear-gradient(90deg,#1a1500,#252000)",border:"1px solid #F1C40F",borderRadius:10,padding:"13px 14px",marginBottom:18,color:"#F1C40F",fontSize:13}}>
          <div><div style={{fontWeight:700}}>Saturday — Test Day</div><div style={{fontSize:12,opacity:.85}}>Green = ahead. Red = behind.</div></div>
        </div>}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0f0f1e",border:"1px solid #1e1e35",borderRadius:10,padding:"12px 16px",marginBottom:18}}>
          <button onClick={()=>setCurrentWeek(w=>Math.max(1,w-1))} style={{background:"#1e1e35",border:"none",borderRadius:6,color:"#e8e8f0",width:36,height:36,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,letterSpacing:3,color:"#fff"}}>WEEK {currentWeek} <span style={{opacity:.4,fontSize:13,fontWeight:400}}>of 10</span></div>
          <button onClick={()=>setCurrentWeek(w=>Math.min(10,w+1))} style={{background:"#1e1e35",border:"none",borderRadius:6,color:"#e8e8f0",width:36,height:36,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:22}}>
          {METRICS.map(m=>{
            const goal=WEEKS[currentWeek-1].goals[m.key],actual=actuals[currentWeek]?.[m.key],diff=getDiff(currentWeek,m.key);
            return <div key={m.key} style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderTop:`3px solid ${m.color}`,borderRadius:10,padding:14,display:"flex",flexDirection:"column",gap:6}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,letterSpacing:2,color:"#666"}}>{m.label}</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:m.color}}>{goal}<span style={{fontSize:11,opacity:.5,marginLeft:4}}>{m.unit}</span></div>
              <input type="number" placeholder={m.key==="weight"?"Morning wt":"Actual"} value={actual??""} step={m.key==="run"||m.key==="weight"?"0.1":"1"} onChange={e=>setActual(currentWeek,m.key,e.target.value)} style={{background:"#14142a",border:"1px solid #2a2a4a",borderRadius:6,padding:"7px 10px",color:"#e8e8f0",fontFamily:"'IBM Plex Mono',monospace",fontSize:16,width:"100%",outline:"none"}}/>
              <div style={{borderRadius:6,padding:"5px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,letterSpacing:1,textAlign:"center",color:diffColor(diff),background:diffBg(diff),border:`1px solid ${diffBorder(diff)}`}}>{fmtDiff(diff,m.key)}{diff!==null&&<span style={{fontSize:10,marginLeft:3,opacity:.7}}>{m.unit}</span>}</div>
            </div>;
          })}
        </div>

        {/* All weeks table */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase"}}>All Weeks</div>
          <div style={{fontSize:10,color:saveStatus==="saved"?"#2ECC71":"#55556a",transition:"color .3s",fontFamily:"'IBM Plex Mono',monospace"}}>{saveStatus==="saving"&&"saving"}{saveStatus==="saved"&&"saved"}</div>
        </div>
        <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #1e1e35",marginBottom:24}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr>
              <th style={{padding:"10px 6px",background:"#0f0f1e",fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:700,letterSpacing:2,textAlign:"center",borderBottom:"1px solid #1e1e35",color:"#aaaaaa"}}>Wk</th>
              {METRICS.map(m=><th key={m.key} style={{padding:"10px 6px",background:"#0f0f1e",fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:700,letterSpacing:2,textAlign:"center",borderBottom:"1px solid #1e1e35",color:m.color,whiteSpace:"nowrap"}}>
                {m.key==="legraises"?"Legs":m.key==="pushups"?"Push":m.key==="pullups"?"Pull":m.key==="weight"?"Wt":m.key==="dips"?"Dips":"Run"}
              </th>)}
            </tr></thead>
            <tbody>{WEEKS.map(({week,goals})=><tr key={week} className="row-hover" style={{background:week===currentWeek?"#0f0f22":"transparent",cursor:"pointer"}} onClick={()=>setCurrentWeek(week)}>
              <td style={{padding:"7px 6px",textAlign:"center",borderBottom:"1px solid #10101e",color:week===currentWeek?"#E67E22":"#aaaaaa",fontWeight:week===currentWeek?700:400}}>W{week}</td>
              {METRICS.map(m=>{const diff=getDiff(week,m.key),actual=actuals[week]?.[m.key];return<td key={m.key} style={{padding:"7px 6px",textAlign:"center",borderBottom:"1px solid #10101e"}}>
                <div style={{fontSize:10,opacity:.4}}>{goals[m.key]}</div>
                {actual!==undefined&&<div style={{fontSize:12,fontWeight:700,color:diffColor(diff)}}>{fmtDiff(diff,m.key)}</div>}
              </td>;})}
            </tr>)}</tbody>
          </table>
        </div>
        <div style={{fontSize:11,color:"#666680",marginBottom:24,textAlign:"center"}}>Tap any row to jump to that week</div>

        {/* Progress chart */}
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12}}>Progress Chart</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:14}}>
          {METRICS.map(m=><button key={m.key} onClick={()=>setGraphMetric(m.key)} style={{padding:"8px 4px",borderRadius:8,border:`1px solid ${graphMetric===m.key?m.color:"#1e1e35"}`,background:graphMetric===m.key?m.color+"18":"#0f0f1e",color:graphMetric===m.key?m.color:"#666680",fontFamily:"'IBM Plex Mono',monospace",fontSize:10,fontWeight:600,cursor:"pointer",transition:"all .15s",display:"flex",flexDirection:"column",alignItems:"center",gap:3,boxShadow:graphMetric===m.key?`0 0 12px ${m.color}30`:"none"}}>
            <span style={{fontSize:13}}>{m.label}</span>
          </button>)}
        </div>
        {(()=>{
          const m=METRICS.find(x=>x.key===graphMetric);
          const gv=WEEKS.map(w=>w.goals[graphMetric]),av=WEEKS.map(w=>actuals[w.week]?.[graphMetric]);
          const hasA=av.some(v=>v!==undefined),all=[...gv,...av.filter(v=>v!==undefined)];
          const minV=Math.min(...all)*0.92,maxV=Math.max(...all)*1.05;
          const W=320,H=160,PL=36,PR=12,PT=12,PB=28,cW=W-PL-PR,cH=H-PT-PB;
          const xOf=i=>PL+(i/(WEEKS.length-1))*cW,yOf=v=>PT+cH-((v-minV)/(maxV-minV))*cH;
          const gp=gv.map((v,i)=>`${i===0?"M":"L"}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(" ");
          const ap=av.map((v,i)=>v!==undefined?{x:xOf(i),y:yOf(v),v,i}:null).filter(Boolean);
          const al=ap.length>1?ap.map((p,j)=>`${j===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" "):null;
          return <div style={{background:"#0a0a16",borderRadius:12,border:"1px solid #1a1a2e",padding:"12px 8px 8px"}}>
            <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block",margin:"0 auto"}}>
              {Array.from({length:5},(_,i)=>{const v=minV+(maxV-minV)*(i/4),y=yOf(v);return<g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1a1a2e" strokeWidth="1"/><text x={PL-4} y={y+4} textAnchor="end" fill="#3a3a5a" fontSize="8" fontFamily="monospace">{v.toFixed(m.key==="run"||m.key==="weight"?1:0)}</text></g>;})}
              {WEEKS.map(({week},i)=><text key={week} x={xOf(i)} y={H-6} textAnchor="middle" fill="#3a3a5a" fontSize="8" fontFamily="monospace">W{week}</text>)}
              <path d={gp} fill="none" stroke={m.color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.45"/>
              {gv.map((v,i)=><circle key={i} cx={xOf(i)} cy={yOf(v)} r="2.5" fill="#0a0a16" stroke={m.color} strokeWidth="1.5" opacity="0.5"/>)}
              {al&&<path d={al} fill="none" stroke={m.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
              {ap.map(p=><g key={p.i}><circle cx={p.x} cy={p.y} r="4" fill={m.color} stroke="#0a0a16" strokeWidth="1.5"/><text x={p.x} y={p.y-8} textAnchor="middle" fill={m.color} fontSize="8" fontFamily="monospace" fontWeight="bold">{p.v.toFixed(m.key==="run"||m.key==="weight"?1:0)}</text></g>)}
              <line x1={xOf(currentWeek-1)} y1={PT} x2={xOf(currentWeek-1)} y2={H-PB} stroke="#E67E22" strokeWidth="1" strokeDasharray="2,2" opacity="0.4"/>
            </svg>
            <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6}}>
              <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#666680"}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={m.color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.5"/></svg>Goal</div>
              <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:m.color}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={m.color} strokeWidth="2.5"/></svg>Actual</div>
            </div>
            {!hasA&&<div style={{textAlign:"center",fontSize:10,color:"#55556a",marginTop:6}}>Log actuals on Saturdays to see your progress line</div>}
          </div>;
        })()}
      </div>}

      {/* NUTRITION TAB */}
      {tab==="nutrition"&&<div className="fade">
        {/* Totals */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
          {[{label:"CALORIES",val:totalCal,goal:CAL_GOAL,color:"#3498DB",unit:"cal"},{label:"PROTEIN",val:totalProt,goal:PROT_GOAL,color:"#E67E22",unit:"g"}].map(m=>{
            const left=m.goal-m.val,over=m.val>m.goal;
            return <div key={m.label} style={{background:"#0f0f1e",border:`1px solid ${m.color}33`,borderTop:`3px solid ${m.color}`,borderRadius:10,padding:14}}>
              <div style={{fontSize:9,letterSpacing:2,color:"#666",fontWeight:600,marginBottom:6}}>{m.label}</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:700,color:over?"#E74C3C":m.color,lineHeight:1}}>{Math.round(m.val)}<span style={{fontSize:12,opacity:.6,marginLeft:3}}>{m.unit}</span></div>
              <div style={{fontSize:10,color:over?"#E74C3C":"#555",marginTop:4}}>{over?`${Math.abs(Math.round(left))}${m.unit} over`:`${Math.abs(Math.round(left))}${m.unit} left`}</div>
              <div style={{height:3,background:"#1a1a2e",borderRadius:2,overflow:"hidden",marginTop:8}}><div style={{height:"100%",borderRadius:2,background:over?"#E74C3C":m.color,width:`${Math.min(100,(m.val/m.goal)*100)}%`,transition:"width .4s ease"}}/></div>
            </div>;
          })}
        </div>

        {/* Food input */}
        <div style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{fontSize:9,letterSpacing:2,color:"#666680",fontWeight:600,marginBottom:10}}>LOG FOOD</div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={nutInput} onChange={e=>setNutInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&lookupNutrition()}
              placeholder="e.g. Wendy's Dave's Double meal"
              style={{flex:1,background:"#0a0a18",border:"1px solid #2a2a4a",borderRadius:8,padding:"10px 12px",color:"#e8e8f0",fontFamily:"'IBM Plex Mono',monospace",fontSize:14,outline:"none"}}/>
            <button onClick={lookupNutrition} disabled={nutLoading||!nutInput.trim()}
              style={{background:"#E67E22",border:"none",borderRadius:8,padding:"0 16px",color:"#000",fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0,opacity:nutLoading||!nutInput.trim()?0.5:1}}>
              {nutLoading?"...":"Add"}
            </button>
          </div>
          {nutError&&<div style={{fontSize:11,color:"#E74C3C",lineHeight:1.5}}>{nutError}</div>}
        </div>

        {/* Food log list */}
        {nutLog.length>0&&<div style={{marginBottom:20}}>
          <div style={{fontSize:9,letterSpacing:2,color:"#666680",fontWeight:600,marginBottom:10}}>TODAY'S LOG</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {nutLog.map(entry=><div key={entry.id} style={{display:"flex",alignItems:"center",gap:10,background:"#0f0f1e",border:"1px solid #1e1e35",borderRadius:8,padding:"10px 12px"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,color:"#ccc",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.desc}</div>
                <div style={{fontSize:10,color:"#444"}}>{entry.time}</div>
              </div>
              <div style={{display:"flex",gap:12,alignItems:"center",flexShrink:0}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#3498DB"}}>{entry.cal}<span style={{fontSize:9,opacity:.6}}>cal</span></div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,color:"#E67E22"}}>{entry.prot}<span style={{fontSize:9,opacity:.6}}>g</span></div>
                </div>
                <button onClick={()=>setNutLog(p=>p.filter(e=>e.id!==entry.id))} style={{background:"none",border:"none",color:"#E74C3C",fontSize:16,cursor:"pointer",padding:"0 2px",opacity:.6}}>x</button>
              </div>
            </div>)}
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",borderTop:"1px solid #1e1e35",marginTop:4}}>
              <div style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600}}>TOTAL</div>
              <div style={{display:"flex",gap:12}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#3498DB"}}>{totalCal}<span style={{fontSize:9,opacity:.6}}>cal</span></span>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#E67E22"}}>{totalProt}<span style={{fontSize:9,opacity:.6}}>g</span></span>
              </div>
            </div>
          </div>
        </div>}

        {/* Current week graph */}
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12}}>Weekly Nutrition</div>
        <NutritionGraph weekData={currentWeekNutData()} weekLabel={`Week ${currentWeek}`} isCurrent={true}/>

        {/* Previous weeks */}
        {prevWeeksNutData().length>0&&<div style={{marginTop:16}}>
          <div style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600,marginBottom:10}}>PREVIOUS WEEKS</div>
          {prevWeeksNutData().map(({label,data})=><NutritionGraph key={label} weekData={data} weekLabel={label} isCurrent={false}/>)}
        </div>}
      </div>}

    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
