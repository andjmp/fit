function parseRestSecs(rest) {
  if (!rest || rest === "—") return 0;
  const m = rest.match(/(\d+)[\s–-]+(\d+)\s*min/);
  if (m) return parseInt(m[1]) * 60;
  const s = rest.match(/(\d+)\s*min/);
  if (s) return parseInt(s[1]) * 60;
  const sec = rest.match(/(\d+)\s*sec/);
  if (sec) return parseInt(sec[1]);
  return 0;
}

const DAILY_TIPS = [
  ["Rest day — use it. Muscles don't grow during workouts, they grow during recovery. Tonight's sleep matters more than any set you could do right now.","First Monday down. The hardest part of any program is showing up consistently in the first two weeks before it becomes habit. You're building that habit now.","On run days, the enemy is ego. Going too fast too early is the #1 reason people get shin splints and drop off. Embarrassingly slow is the right pace right now.","Your pull-up strength will feel disproportionately low compared to other lifts at first. That's normal — the movement pattern is new. The gains in weeks 3–6 will feel sudden.","Bulgarian split squats are humbling for everyone. If your balance is off, find a fixed surface for your rear foot instead of a padded bench — it's more stable.","Protein timing matters less than protein total. Don't stress about the post-workout window — just hit your 165g across the day however works for you.","First test day. Log your numbers honestly, even if they're below goal. Accurate data now means better decisions over the next 9 weeks."],
  ["Week 2 rest day. Your body is adapting to new stress — you may feel more tired than week 1. That's the adaptation process working, not a sign you're overtrained.","Progressive overload is the whole game. If you lifted the same weight for the same reps as last week, you didn't get stronger — you maintained. Always try to add something.","Easy run pace check: if you finish your run feeling like you could have gone faster, you nailed it. If you're winded, you went too hard.","The drop-off in pull-up reps across sets is normal and expected. Focus on quality of movement, not matching your first set. Sets 3–4 being lower is fine.","Ankle mobility drill: stand facing a wall, place toes 3 inches away, and try to touch your knee to the wall without lifting your heel. Do 10 each side.","Eating enough is a skill, not just willpower. If you're under on calories, add an extra tablespoon of peanut butter or olive oil to meals — easy 100–120 calories with no extra volume.","Before logging today's results, do each test cold — don't warm up specifically for it. You want a consistent baseline each week."],
  ["Two full weeks in. The soreness from new movements should be fading. That doesn't mean you're not working hard enough — it means your body has adapted to the stimulus.","This week try to add a small amount of weight or one extra rep to at least one exercise. Small wins compound dramatically over 10 weeks.","Midpoint of your 10K build. You're at 2.5 miles this week — exactly halfway to race distance. The second half of the build will feel easier than the first.","Pull-up tip: at the top of each rep, try to pull your elbows toward your hips rather than just pulling your chin over the bar. It recruits more lat and less arm.","If pistol squat practice feels stuck, check your ankle mobility first. 80% of pistol squat failures are ankle-related, not strength-related.","Sleep is your most underrated performance tool. One bad night won't hurt you, but chronic under-sleeping will stall your strength gains more than any training variable.","Week 3 test day. You should start seeing small improvements over week 1 baseline — even 1–2 reps improvement is meaningful progress."],
  ["Rest. You're a month in. Take stock — you've built a real streak. Four weeks of consistent training is something most people never sustain.","Week 4 is often when training starts to feel routine rather than novel. That's actually ideal — you want it to feel like brushing your teeth, not a special event.","Tempo run tip: find a pace where you could sing but only one word at a time. That's your 75% effort sweet spot.","This week's pull-up goal steps up. If last week felt manageable, resist the urge to blast through sets — controlled, full-range reps build more strength than fast partial ones.","By now your squat form should be getting consistent. Focus on keeping your chest up and your weight through your whole foot, not just your toes.","Creatine is one of the most well-studied supplements for strength and muscle gain. If you're not taking it, 5g per day is worth considering — inexpensive and effective.","Halfway through the program. Your body composition has likely already shifted even if the scale hasn't caught up yet."],
  ["Week 5 rest. You're in the middle stretch now — the initial excitement has worn off but you haven't reached the finish line yet. This is where character is built.","Double progression reminder: always try to hit all your target reps cleanly before adding weight. Chasing heavier weight with sloppy form is how progress stalls.","You've run over 20 miles total across this program so far. Your aerobic base is meaningfully stronger than it was 5 weeks ago.","If your pull-ups are feeling stronger, try pausing for 1 second at the top of each rep with your chin clearly over the bar. It makes every rep count more.","Bulgarian split squat tip: lean your torso slightly forward about 10–15 degrees. It shifts more load onto the glute and makes the movement more stable.","Hydration affects strength more than most people realize. Even mild dehydration reduces performance noticeably. Aim for a gallon on training days.","Five weeks of data in your tracker now. Look at the trend, not just this week's number. Consistent upward trends beat random big weeks every time."],
  ["Six weeks in. Rest well. At this point your body has fundamentally adapted to the training stimulus — you're building on a real foundation now.","Week 6 is a good time to film yourself doing squats or pull-ups from the side. You'll catch form issues you can't feel — depth, bar path, elbow position.","Four miles on the run plan this week. You're at 65% of race distance. At this point the 10K is a question of when, not if.","If you're hitting 9 pull-up reps on your best set, start thinking about keeping 1–2 reps in the tank on set 1. You'll get more total volume across the session.","Pistol squat check-in: can you hold the bottom position for 5 seconds while holding support? If not, spend time just sitting in the bottom of a squat — great hip and ankle opener.","On high-protein days when eating feels like a chore, liquid calories help: whole milk, protein shakes, smoothies with nut butter. Easier to consume than solid food.","Six weeks of splits. Look at which goals are consistently green and which are red. If something is consistently behind, the goal may need adjustment — or the training does."],
  ["Seven weeks down. Three to go. You can smell the finish line from here — but this is also when people start coasting. Don't.","At week 7, your body has largely adapted to the movement patterns. Now the gains come from progressive overload alone — weight, reps, or density. Pick one to push each session.","4.5 miles this week. One more mile and you could theoretically walk the second half of the 10K. You won't need to.","If you haven't already, try doing pull-ups with a 2-second pause at the dead hang between reps. Full extension at the bottom is a commonly skipped range of motion.","The Bulgarian split squat should be feeling significantly more manageable than week 1. That's real strength development — not just getting used to the discomfort.","Pre-workout meal timing: eating 60–90 minutes before training is the sweet spot for most people. Too close and you feel heavy; too far and you feel empty.","Week 7 test. You're 70% through the program. Your numbers should show a clear upward trend from week 1. If they don't, something in recovery or nutrition needs attention."],
  ["Rest day, week 8. Two weeks left. Your Memorial Day fitness is essentially locked in at this point — the last two weeks are about peaking, not building.","This week focus on quality over quantity. Perfect reps matter more than grinding out ugly extras at this stage in the program.","Five miles this week. You're at 80% of race distance. This is your longest run of the program — take it slow and just finish it.","Pull-up volume is near its peak. Make sure you're eating enough — under-eating is the silent killer of strength progress in the final weeks.","If calf raises have been easy, try doing them on a step with full range of motion — heel drop below the step. Dramatically harder and more effective.","By now you should have a sense of which muscles are your weak links. Make a mental note — that's your post-Memorial Day training priority list writing itself.","Week 8 test. You're nearly there. The last two weeks of data will complete the picture of what 10 weeks of consistent work actually produces."],
  ["Second-to-last rest day. Your body knows what it's doing now. Trust it.","Don't add new exercises or dramatically change anything this week. Consistency and execution quality are the only variables worth controlling now.","5.5 miles this week. If you finish Sunday's run, you can run a 10K. The rest is just race-day pacing.","Final push on pull-ups. Whatever your max unassisted set is right now is roughly where you'll be on Memorial Day — maintenance mode from here.","Pistol squat check: can you do an unassisted attempt yet? Even a wobbly one counts. The first one is always the hardest — after that the neural pathway opens up.","Taper your calories slightly this week if appetite is low — but keep protein high. Muscle isn't going anywhere in one week of slightly reduced calories.","Week 9 test. One more week. Your final numbers next Saturday will be your Memorial Day benchmark."],
  ["Final rest day. You've done the work. Tomorrow is just showing up.","Last week. Don't do anything heroic — no new PRs, no extra sessions. Execute what you've been doing and let the results speak.","Taper week run: keep it short and easy. Save your legs for race day. The fitness is built — you can't add anything meaningful in 5 days.","Final pull-up session. Leave something in the tank. You want fresh arms for the test on Saturday.","Last leg day. Treat it like a maintenance session — don't grind. You need healthy joints for Memorial Day.","Race week nutrition: keep calories up, stay hydrated, don't try anything new. Familiar foods, good sleep, lots of water.","Memorial Day test day. You started 10 weeks ago. Whatever you log today is what 10 weeks of consistent work looks like. Be proud of showing up — the numbers are secondary."],
];

// ── Rest Timer ───────────────────────────────────────────────────────────────
function RestTimer({ restStr, color }) {
  const totalSecs = parseRestSecs(restStr);
  const [state, setState] = useState("idle");
  const [elapsed, setElapsed] = useState(0);
  const intervalRef = useRef(null);
  const start = () => { setState("running"); setElapsed(0); intervalRef.current = setInterval(()=>setElapsed(e=>{ if(e+1>=totalSecs){clearInterval(intervalRef.current);setState("done");return totalSecs;} return e+1; }),1000); };
  const reset = () => { clearInterval(intervalRef.current); setState("idle"); setElapsed(0); };
  useEffect(()=>()=>clearInterval(intervalRef.current),[]);
  if (!totalSecs) return <div style={RT.row}><span style={RT.label}>REST</span><span style={{...RT.val,color:"#666680"}}>—</span></div>;
  const pct=elapsed/totalSecs, remaining=totalSecs-elapsed, mins=Math.floor(remaining/60), secs=remaining%60;
  const timeStr=mins>0?`${mins}:${secs.toString().padStart(2,"0")}`:remaining+"s";
  return (
    <button onClick={state==="idle"?start:reset} style={{...RT.btn,overflow:"hidden",position:"relative"}}>
      {state!=="idle"&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct*100}%`,background:state==="done"?color:"#E67E22",transition:state==="running"?"width 1s linear":"none",borderRadius:8}}/>}
      <span style={{...RT.label,position:"relative",zIndex:1}}>REST</span>
      <span style={{...RT.val,position:"relative",zIndex:1,color:color,fontWeight:state==="done"?900:700}}>
        {state==="idle"?restStr:state==="done"?"✓ done":timeStr}
      </span>
    </button>
  );
}
const RT={row:{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0a0a18",borderRadius:8,padding:"10px 14px",marginBottom:14},btn:{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#141428",borderRadius:8,padding:"10px 14px",marginBottom:14,width:"100%",border:"none",cursor:"pointer"},label:{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600},val:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700}};

function ExOverlay({ex,workout,repChecked,onRepCheck,onClose,onAllDone}) {

  const allSetsDone=totalSets>0&&d.sets.every((_,si)=>repChecked[`${ex.id}_s${si}`]);

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"#0f0f1e",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:560,maxHeight:"88vh",overflowY:"auto",animation:"slideUp .25s ease both"}} onClick={e=>e.stopPropagation()}>

            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:"#fff",lineHeight:1.2}}>{ex.text}</div>
              <div style={{fontSize:10,color:"#666680",letterSpacing:1,marginTop:2}}>{workout.label}</div>
            </div>
            <button onClick={onClose} style={{background:"#1a1a2e",border:"none",borderRadius:"50%",width:30,height:30,color:"#666",fontSize:14,cursor:"pointer",flexShrink:0}}>✕</button>
          </div>
          {d.weight&&d.weight!=="—"&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#14120a",border:"1px solid #2a2200",borderRadius:8,padding:"10px 14px",marginBottom:12}}><span style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600}}>WEIGHT / RESISTANCE</span><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#F1C40F"}}>{d.weight}</span></div>}
          <div style={{fontSize:12,color:"#aaaaaa",lineHeight:1.6,background:"#080810",borderRadius:8,padding:"10px 12px",marginBottom:14}}>{d.notes}</div>
          <RestTimer restStr={d.rest} color={workout.color}/>
          {totalSets>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600,marginBottom:8}}>SETS — {d.sets.filter((_,si)=>repChecked[`${ex.id}_s${si}`]).length}/{totalSets} done</div>
              {d.sets.map((s,si)=>{
                const key=`${ex.id}_s${si}`,done=!!repChecked[key];
                return <button key={si} onClick={()=>onRepCheck(key)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:done?"#0d2a1a":"#0a0a18",border:`1px solid ${done?workout.color:"#1e1e35"}`,borderRadius:8,padding:"11px 14px",marginBottom:6,cursor:"pointer",transition:"all .15s"}}>
                  <div style={{width:20,height:20,borderRadius:5,flexShrink:0,background:done?workout.color:"transparent",border:`2px solid ${done?workout.color:"#2e2e4e"}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>{done&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}</div>
                  <span style={{flex:1,textAlign:"left",fontSize:13,color:done?"#5a5a6a":"#ccc",textDecoration:done?"line-through":"none"}}>{s.l}</span>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:done?"#3a3a5a":workout.color}}>{s.r}{typeof s.r==="number"?" reps":""}</span>
                </button>;
              })}
            </div>
          )}
          <button onClick={()=>{onAllDone(ex.id);onClose();}} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:allSetsDone?workout.color:"#1e1e35",color:allSetsDone?"#fff":"#aaaaaa",fontFamily:"'IBM Plex Mono',monospace",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>{allSetsDone?"✓ Mark Complete":"Mark Complete"}</button>
        </div>
      </div>
    </div>
  );
}

  const [puSets,setPuSets]=useState(0);

  useEffect(()=>{
    const a=LS.get("ft_actuals"); if(a) setActuals(a);
    const d=LS.get("ft_daily_"+todayKey);

  const fmtDiff=(diff,key)=>{if(diff===null)return"—";const d=key==="run"||key==="weight"?1:0;return`${diff>=0?"+":""}${diff.toFixed(d)}`;};

  const diffBg=diff=>diff===null?"#1a1a2a":diff>=0?"#0d2a1a":"#2a0d0d";

  useEffect(()=>{ workout.exercises.forEach(ex=>{ const d=EX_DETAILS[ex.id]; if(!d||d.sets.length===0)return; if(d.sets.every((_,si)=>repChecked[`${ex.id}_s${si}`])&&!checked[ex.id])setChecked(p=>({...p,[ex.id]:true})); }); },[repChecked]);

              const al=ap.length>1?ap.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" "):null;
              return <div style={{background:"#0a0a16",borderRadius:12,border:"1px solid #1a1a2e",padding:"12px 8px 8px",overflowX:"auto"}}>
                <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block",margin:"0 auto"}}>
                  {Array.from({length:5},(_,i)=>{const v=minV+(maxV-minV)*(i/4),y=yOf(v);return<g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1a1a2e" strokeWidth="1"/><text x={PL-4} y={y+4} textAnchor="end" fill="#3a3a5a" fontSize="8" fontFamily="monospace">{v.toFixed(m.key==="run"||m.key==="weight"?1:0)}</text></g>;})}
                  {WEEKS.map(({week},i)=><text key={week} x={xOf(i)} y={H-6} textAnchor="middle" fill="#3a3a5a" fontSize="8" fontFamily="monospace">W{week}</text>)}
                  <path d={gp} fill="none" stroke={m.color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.45"/>
                  {gv.map((v,i)=><circle key={i} cx={xOf(i)} cy={yOf(v)} r="2.5" fill="#0a0a16" stroke={m.color} strokeWidth="1.5" opacity="0.5"/>)}
                  {al&&<path d={al} fill="none" stroke={m.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
                  {ap.map(p=><g key={p.i}><circle cx={p.x} cy={p.y} r="4" fill={m.color} stroke="#0a0a16" strokeWidth="1.5"/><text x={p.x} y={p.y-8} textAnchor="middle" fill={m.color} fontSize="8" fontFamily="monospace" fontWeight="bold">{p.v.toFixed(m.key==="run"||m.key==="weight"?1:0)}</text></g>)}
                  <line x1={xOf(currentWeek-1)} y1={PT} x2={xOf(currentWeek-1)} y2={H-PB} stroke="#E67E22" strokeWidth="1" strokeDasharray="2,2" opacity="0.4"/>
                </svg>
                <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#666680"}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={m.color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.5"/></svg>Goal</div>
                  <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:m.color}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={m.color} strokeWidth="2.5"/></svg>Actual</div>
                </div>
                {!hasA&&<div style={{textAlign:"center",fontSize:10,color:"#55556a",marginTop:6}}>Log actuals on Saturdays to see your progress line</div>}
              </div>;
            })()}
          </div>
        </div>}

        {/* GOALS */}
        {tab==="goals"&&<div className="fade">
          <div style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderLeft:`3px solid ${tomorrowWorkout.color}`,borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{fontSize:9,letterSpacing:2,color:"#666680",marginBottom:6,fontWeight:600}}>UP NEXT — {tomorrowDay.toUpperCase()}</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:"#fff",marginBottom:8}}>{tomorrowWorkout.label}</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {tomorrowWorkout.exercises.map(ex=>{ const d=EX_DETAILS[ex.id]; return <div key={ex.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"#aaaaaa"}}>{ex.text}</span>{d?.weight&&d.weight!=="—"&&<span style={{fontSize:10,color:"#F1C40F",opacity:.8}}>{d.weight}</span>}</div>; })}
            </div>
          </div>
          <div style={{background:"#0a0a18",border:"1px solid #1e2a1e",borderRadius:12,padding:16,marginBottom:20}}>
            <div style={{fontSize:9,letterSpacing:2,color:"#666680",fontWeight:600,marginBottom:8}}>💡 TODAY'S TIP</div>
            <div style={{fontSize:13,color:"#c8c8d8",lineHeight:1.7}}>{getDailyTip(currentWeek)}</div>
          </div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12}}>Long-Term Goals</div>
          {LONG_TERM_GOALS.map((g,i)=><div key={i} style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:"#fff"}}>{g.icon} {g.title}</div>
              <div style={{fontSize:10,background:"#1e1e35",color:"#aaaaaa",padding:"3px 9px",borderRadius:20,fontFamily:"'IBM Plex Mono',monospace",whiteSpace:"nowrap",marginLeft:8,marginTop:2}}>{g.eta}</div>
            </div>
            <div style={{fontSize:12,color:"#777",lineHeight:1.6,marginBottom:12,fontStyle:"italic"}}>{g.tip}</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>{g.phases.map((p,j)=><div key={j} style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{width:6,height:6,borderRadius:"50%",background:"#E67E22",flexShrink:0,marginTop:5,display:"block"}}/><span style={{fontSize:12,color:"#aaaaaa",lineHeight:1.5}}>{p}</span></div>)}</div>
          </div>)}
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
