function getWeight(exKey, weekNum){
  const phase = weekNum <= 4 ? 0 : weekNum <= 8 ? 1 : 2;

    ohp:    ["25 lbs","30 lbs","35 lbs"],
    fly:    ["70 lbs","80 lbs","90 lbs"],
    squat:  ["25 lb dumbbells","35 lb dumbbells","45 lb dumbbells"],
    bss:    ["Bodyweight","10 lb dumbbells","20 lb dumbbells"],
    calf:   ["35 lbs","40 lbs","45 lbs"],
    hcurl:  ["25 lbs","30 lbs","35 lbs"],
    curl:   ["25 lbs","30 lbs","35 lbs"],
    lat:    ["15 lbs","15 lbs","20 lbs"],
  };
  return weights[exKey]?.[phase] || null;
}

// ── Week calculation ──────────────────────────────────────────────────────────
function getCurrentWeek(){
  const now = new Date();
  if(now < PROGRAM_START) return 1;
  return Math.min(12, Math.max(1, Math.floor((now - PROGRAM_START)/(7*24*60*60*1000))+1));
}

// ── Rest Timer ────────────────────────────────────────────────────────────────
function parseRestSecs(r){
  if(!r||r==="—")return 0;
  const m=r.match(/(\d+)[\s–-]+(\d+)\s*min/);if(m)return parseInt(m[1])*60;
  const s=r.match(/(\d+)\s*min/);if(s)return parseInt(s[1])*60;
  const sc=r.match(/(\d+)\s*sec/);if(sc)return parseInt(sc[1]);return 0;
}
function RestTimer({restStr,color}){
  const total=parseRestSecs(restStr);
  const [state,setState]=useState("idle");
  const [elapsed,setElapsed]=useState(0);
  const iv=useRef(null);
  const start=()=>{setState("running");setElapsed(0);iv.current=setInterval(()=>setElapsed(e=>{if(e+1>=total){clearInterval(iv.current);setState("done");return total;}return e+1;}),1000);};
  const reset=()=>{clearInterval(iv.current);setState("idle");setElapsed(0);};
  useEffect(()=>()=>clearInterval(iv.current),[]);
  if(!total)return<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0a0a18",borderRadius:8,padding:"10px 14px",marginBottom:14}}><span style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600}}>REST</span><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:"#666680"}}>—</span></div>;
  const pct=elapsed/total,rem=total-elapsed,mins=Math.floor(rem/60),secs=rem%60,ts=mins>0?`${mins}:${secs.toString().padStart(2,"0")}`:rem+"s";
  return<button onClick={state==="idle"?start:reset} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#141428",borderRadius:8,padding:"10px 14px",marginBottom:14,width:"100%",border:"none",cursor:"pointer",overflow:"hidden",position:"relative"}}>
    {state!=="idle"&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct*100}%`,background:state==="done"?color:"#E67E22",transition:state==="running"?"width 1s linear":"none",borderRadius:8}}/>}
    <span style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600,position:"relative",zIndex:1}}>REST</span>
    <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:color,position:"relative",zIndex:1}}>{state==="idle"?restStr:state==="done"?"done":ts}</span>
  </button>;
}

              <div style={{width:20,height:20,borderRadius:5,flexShrink:0,background:done?color:"transparent",border:`2px solid ${done?color:"#2e2e4e"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>{done?<span style={{color:"#fff",fontSize:11,fontWeight:700,lineHeight:1}}>✓</span>:null}</div>

// ── Nutrition Graph ───────────────────────────────────────────────────────────
function NutritionGraph({weekData,weekLabel,isCurrent}){
  const W=320,PL=36,PR=36,PT=10,PB=20,H=isCurrent?160:52,cW=W-PL-PR,cH=H-PT-PB;
  const numLines=isCurrent?5:1;
  const maxCal=Math.max(CAL_GOAL,...weekData.filter(Boolean).map(d=>d.cal||0))*1.05;
  const maxProt=Math.max(PROT_GOAL,...weekData.filter(Boolean).map(d=>d.prot||0))*1.05;
  const xOf=i=>PL+(i/6)*cW;
  const yOfCal=v=>PT+cH-(v/maxCal)*cH;
  const yOfProt=v=>PT+cH-(v/maxProt)*cH;
  const calPts=weekData.map((d,i)=>d&&d.cal?{x:xOf(i),y:yOfCal(d.cal),v:d.cal,i}:null).filter(Boolean);
  const protPts=weekData.map((d,i)=>d&&d.prot?{x:xOf(i),y:yOfProt(d.prot),v:d.prot,i}:null).filter(Boolean);
  const calPath=calPts.length>1?calPts.map((p,j)=>`${j===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" "):null;
  const protPath=protPts.length>1?protPts.map((p,j)=>`${j===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" "):null;
  return<div style={{background:"#0a0a16",borderRadius:isCurrent?12:8,border:"1px solid #1a1a2e",padding:isCurrent?"12px 8px 8px":"6px 8px",marginBottom:8}}>
    <div style={{fontSize:9,color:isCurrent?"#666680":"#333",letterSpacing:isCurrent?2:0,fontWeight:isCurrent?600:400,marginBottom:isCurrent?8:4,paddingLeft:PL}}>{weekLabel}</div>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block",margin:"0 auto"}}>
      {Array.from({length:numLines+1},(_,i)=>{const y=PT+(i/numLines)*cH;return<line key={i} x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1a1a2e" strokeWidth="1"/>;} )}
      <line x1={PL} y1={yOfCal(CAL_GOAL)} x2={W-PR} y2={yOfCal(CAL_GOAL)} stroke="#3498DB" strokeWidth="1" strokeDasharray="3,3" opacity="0.5"/>
      <line x1={PL} y1={yOfProt(PROT_GOAL)} x2={W-PR} y2={yOfProt(PROT_GOAL)} stroke="#E67E22" strokeWidth="1" strokeDasharray="3,3" opacity="0.5"/>
      {isCurrent&&Array.from({length:numLines+1},(_,i)=>{const y=PT+(i/numLines)*cH,frac=1-(i/numLines);return<g key={i}><text x={PL-4} y={y+4} textAnchor="end" fill="#3a3a5a" fontSize="7" fontFamily="monospace">{Math.round(maxCal*frac)}</text><text x={W-PR+4} y={y+4} textAnchor="start" fill="#3a3a5a" fontSize="7" fontFamily="monospace">{Math.round(maxProt*frac)}</text></g>;})}
      {isCurrent&&["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map((d,i)=><text key={i} x={xOf(i)} y={H-4} textAnchor="middle" fill="#3a3a5a" fontSize="7" fontFamily="monospace">{d}</text>)}
      {calPath&&<path d={calPath} fill="none" stroke="#3498DB" strokeWidth={isCurrent?2:1.5} strokeLinecap="round" strokeLinejoin="round"/>}
      {isCurrent&&calPts.map(p=><g key={p.i}><circle cx={p.x} cy={p.y} r="3" fill="#3498DB" stroke="#0a0a16" strokeWidth="1.5"/><text x={p.x} y={p.y-6} textAnchor="middle" fill="#3498DB" fontSize="7" fontFamily="monospace">{Math.round(p.v)}</text></g>)}
      {protPath&&<path d={protPath} fill="none" stroke="#E67E22" strokeWidth={isCurrent?2:1.5} strokeLinecap="round" strokeLinejoin="round"/>}
      {isCurrent&&protPts.map(p=><g key={p.i}><circle cx={p.x} cy={p.y} r="3" fill="#E67E22" stroke="#0a0a16" strokeWidth="1.5"/><text x={p.x} y={p.y+14} textAnchor="middle" fill="#E67E22" fontSize="7" fontFamily="monospace">{Math.round(p.v)}</text></g>)}
    </svg>
    {isCurrent&&<div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6}}>
      <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#3498DB"}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke="#3498DB" strokeWidth="2"/></svg>Calories</div>
      <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#E67E22"}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke="#E67E22" strokeWidth="2"/></svg>Protein</div>
    </div>}
  </div>;
}

// ── Pace Graph ────────────────────────────────────────────────────────────────
function PaceGraph({runWeekActuals}){
  // runWeekActuals: {4:{sun,mon,wed,thu,sat}, 8:{...}, 12:{...}}
  const COLORS=["#3498DB","#2ECC71","#E67E22"];
  const DIST_LABELS=["6k","8k","10k","8k","6k"];
  const RUN_WEEKS=[4,8,12];
  const W=320,PL=36,PR=20,PT=12,PB=24,H=140,cW=W-PL-PR,cH=H-PT-PB;
  // collect all pace values to determine scale
  const allPaces=[];
  RUN_WEEKS.forEach(wk=>{
    const d=runWeekActuals[wk]||{};
    [d.sun,d.mon,d.wed,d.thu,d.sat].forEach(v=>{if(v)allPaces.push(v/parseFloat(DIST_LABELS[[d.sun,d.mon,d.wed,d.thu,d.sat].indexOf(v)]))});
  });
  // pace = time/km
  const distKm=[6,8,10,8,6];
  const getPaces=wk=>{
    const d=runWeekActuals[wk]||{};
    return [d.sun,d.mon,d.wed,d.thu,d.sat].map((v,i)=>v?v/distKm[i]:null);
  };
  const allP=RUN_WEEKS.flatMap(w=>getPaces(w).filter(Boolean));
  if(!allP.length) return<div style={{background:"#0a0a16",borderRadius:12,border:"1px solid #1a1a2e",padding:"16px",textAlign:"center",fontSize:10,color:"#55556a"}}>Log run week times to see pace graph</div>;
  const minP=Math.min(...allP)*0.95,maxP=Math.max(...allP)*1.05;
  const xOf=i=>PL+(i/4)*cW;
  const yOf=v=>PT+cH-((v-minP)/(maxP-minP))*cH;
  return<div style={{background:"#0a0a16",borderRadius:12,border:"1px solid #1a1a2e",padding:"12px 8px 8px"}}>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block",margin:"0 auto"}}>
      {Array.from({length:5},(_,i)=>{const y=PT+(i/4)*cH;return<line key={i} x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1a1a2e" strokeWidth="1"/>;} )}
      {DIST_LABELS.map((d,i)=><text key={i} x={xOf(i)} y={H-6} textAnchor="middle" fill="#3a3a5a" fontSize="8" fontFamily="monospace">{d}</text>)}
      {Array.from({length:5},(_,i)=>{const v=minP+(maxP-minP)*(1-i/4);return<text key={i} x={PL-4} y={PT+(i/4)*cH+4} textAnchor="end" fill="#3a3a5a" fontSize="7" fontFamily="monospace">{v.toFixed(1)}</text>;})}
      {RUN_WEEKS.map((wk,wi)=>{
        const paces=getPaces(wk);
        const pts=paces.map((v,i)=>v?{x:xOf(i),y:yOf(v),v,i}:null).filter(Boolean);
        if(pts.length<2)return null;
        const path=pts.map((p,j)=>`${j===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
        return<g key={wk}>
          <path d={path} fill="none" stroke={COLORS[wi]} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {pts.map(p=><circle key={p.i} cx={p.x} cy={p.y} r="3" fill={COLORS[wi]} stroke="#0a0a16" strokeWidth="1.5"/>)}
        </g>;
      })}
    </svg>
    <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:6}}>
      {RUN_WEEKS.map((wk,i)=><div key={wk} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:COLORS[i]}}><svg width="14" height="6"><line x1="0" y1="3" x2="14" y2="3" stroke={COLORS[i]} strokeWidth="2"/></svg>Wk {wk}</div>)}
    </div>
  </div>;
}

// ── Confetti ──────────────────────────────────────────────────────────────────
function Confetti(){
  const colors=["#E67E22","#2ECC71","#3498DB","#E74C3C","#9B59B6","#F1C40F"];
  const pieces=Array.from({length:50},(_,i)=>{
    const left=Math.random()*100;
    const delay=Math.random()*0.3;
    const duration=1.4+Math.random()*1.2;
    const size=5+Math.random()*5;
    const color=colors[i%colors.length];
    const rotate=Math.random()*360;
    const isCircle=Math.random()>0.5;
    return{id:i,left,delay,duration,size,color,rotate,isCircle};
  });
  return<div style={{position:"fixed",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:200}}>
    {pieces.map(p=>(
      <div key={p.id} className="confetti-piece" style={{
        left:`${p.left}%`,
        width:p.size,height:p.size,
        background:p.color,
        borderRadius:p.isCircle?"50%":"2px",
        animation:`confettiFall ${p.duration}s ease-in ${p.delay}s forwards`,
        transform:`rotate(${p.rotate}deg)`,
      }}/>
    ))}
  </div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const today=DAYS[new Date().getDay()];
  const dayIdx=new Date().getDay();
  const todayKey=dateKey();
  const [tab,setTab]=useState("today");
  const [checked,setChecked]=useState({});
  const [repChecked,setRepChecked]=useState({});
  const [actuals,setActuals]=useState({});
  const [runWeekActuals,setRunWeekActuals]=useState({});
  const [currentWeek,setCurrentWeek]=useState(getCurrentWeek);
  const [puSets,setPuSets]=useState(0);
  const [graphMetric,setGraphMetric]=useState("pushups");
  const [saveStatus,setSaveStatus]=useState("");
  const [overlay,setOverlay]=useState(null);
  const [showConfetti,setShowConfetti]=useState(false);
  const wasDone=useRef(false);
  const [activeDateKey,setActiveDateKey]=useState(todayKey);
  const holdTimer=useRef(null);
  const loaded=useRef(false);

  // Detect day rollover if the app/tab stays open past midnight
  useEffect(()=>{
    const checkDate=()=>{
      const nowKey=dateKey();
      if(nowKey!==activeDateKey){
        setActiveDateKey(nowKey);
        setChecked({});
        setRepChecked({});
        setPuSets(0);
        const d=LS.get("ft_daily_"+nowKey);
        if(d){if(d.checked)setChecked(d.checked);if(d.repChecked)setRepChecked(d.repChecked);if(d.puSets!==undefined)setPuSets(d.puSets);}
      }
    };
    const iv=setInterval(checkDate,60000); // check every minute
    document.addEventListener("visibilitychange",checkDate);
    window.addEventListener("focus",checkDate);
    return()=>{clearInterval(iv);document.removeEventListener("visibilitychange",checkDate);window.removeEventListener("focus",checkDate);};
  },[activeDateKey]);

  // Nutrition
  const [nutCal,setNutCal]=useState("");
  const [nutProt,setNutProt]=useState("");
  const [nutDay,setNutDay]=useState(todayKey);
  const [allNutWeeks,setAllNutWeeks]=useState({});

  // ── Load ─────────────────────────────────────────────────────────────────────
  useEffect(()=>{
    const a=LS.get("ft_actuals"); if(a) setActuals(a);
    const rwa=LS.get("ft_runweek_actuals"); if(rwa) setRunWeekActuals(rwa);
    const d=LS.get("ft_daily_"+todayKey);
    if(d){if(d.checked)setChecked(d.checked);if(d.repChecked)setRepChecked(d.repChecked);if(d.puSets!==undefined)setPuSets(d.puSets);}
    const nw=LS.get("ft_nutweeks"); if(nw) setAllNutWeeks(nw);
    // Load today's nutrition values
    const nutData=LS.get("ft_nut_all")||{};
    const todayNut=nutData[todayKey];
    if(todayNut){if(todayNut.cal)setNutCal(String(todayNut.cal));if(todayNut.prot)setNutProt(String(todayNut.prot));}
    loaded.current=true;
  },[]);

  // ── Save ─────────────────────────────────────────────────────────────────────
  useEffect(()=>{if(!loaded.current)return;if(Object.keys(actuals).length===0)return;setSaveStatus("saving");const t=setTimeout(()=>{LS.set("ft_actuals",actuals);setSaveStatus("saved");setTimeout(()=>setSaveStatus(""),1800);},600);return()=>clearTimeout(t);},[actuals]);
  useEffect(()=>{if(!loaded.current)return;LS.set("ft_runweek_actuals",runWeekActuals);},[runWeekActuals]);
  useEffect(()=>{if(!loaded.current)return;LS.set("ft_daily_"+activeDateKey,{checked,repChecked,puSets});},[checked,repChecked,puSets,activeDateKey]);

  // Save nutrition — only when user actually changes values, not on nutDay change
  useEffect(()=>{
    if(!loaded.current)return;
    const cal=parseFloat(nutCal)||0, prot=parseFloat(nutProt)||0;
    const allNut=LS.get("ft_nut_all")||{};
    allNut[nutDay]={cal,prot};
    LS.set("ft_nut_all",allNut);
    if(cal||prot){
      setAllNutWeeks(prev=>{const next={...prev,["w"+currentWeek]:{...(prev["w"+currentWeek]||{}),[nutDay]:{cal,prot}}};LS.set("ft_nutweeks",next);return next;});
    }
  },[nutCal,nutProt]);

  // When nutDay changes (via day-selector navigation only, not on mount), load that day's values
  const nutDayMounted=useRef(false);
  useEffect(()=>{
    if(!nutDayMounted.current){ nutDayMounted.current=true; return; } // skip the mount-triggered run
    const allNut=LS.get("ft_nut_all")||{};
    const dayNut=allNut[nutDay];
    setNutCal(dayNut?.cal?String(dayNut.cal):"");
    setNutProt(dayNut?.prot?String(dayNut.prot):"");
  },[nutDay]);

  // ── Workout for today ─────────────────────────────────────────────────────────
  const runWeek=isRunWeek(currentWeek);
  const workout=runWeek?getRunWeekWorkout(dayIdx):STRENGTH_WORKOUTS[today];

  const puTarget=PU_WEEK_REPS[Math.min(currentWeek-1,11)];
  const showPushups=runWeek?(workout.isMaintenance||false):(!workout.skipPushups&&!workout.isRest);
  const doneCount=workout.exercises.filter(e=>checked[e.id]).length;
  const allDone=workout.isRest||(doneCount===workout.exercises.length&&(showPushups?puSets>=5:true));

  useEffect(()=>{
    if(allDone&&!wasDone.current&&!workout.isRest){
      setShowConfetti(true);
      const t=setTimeout(()=>setShowConfetti(false),2800);
      wasDone.current=true;
      return()=>clearTimeout(t);
    }
    if(!allDone) wasDone.current=false;
  },[allDone]);

  const setActualFn=(wk,key,val)=>setActuals(p=>({...p,[wk]:{...(p[wk]||{}),[key]:val===""?undefined:parseFloat(val)}}));
  const getDiff=(wk,key)=>{
    const a=actuals[wk]?.[key];
    const g=getGoal(key,wk);
    if(a===undefined||g===null)return null;
    const metric=METRICS.find(m=>m.key===key);
    if(metric&&metric.lowerIsBetter) return g-a; // positive = good (faster)
    return a-g;
  };
  const fmtDiff=(diff,key)=>{if(diff===null)return"—";const d=key==="run5k"||key==="weight"?1:0;return`${diff>=0?"+":""}${diff.toFixed(d)}`;};
  const diffColor=diff=>diff===null?"#555":diff>=0?"#2ECC71":"#E74C3C";
  const timeDiffColor=diff=>diff===null?"#555":diff<=0?"#2ECC71":"#E74C3C";
  const timeDiffBg=diff=>diff===null?"#1a1a2a":diff<=0?"#0d2a1a":"#2a0d0d";
  const timeDiffBorder=diff=>diff===null?"#333":diff<=0?"#2ECC71":"#E74C3C";
  const fmtTimeDiff=diff=>{if(diff===null)return"—";return`${diff>=0?"+":""}${diff.toFixed(1)} min`;};
  const diffBg=(diff,key)=>{
    if(diff===null)return"#1a1a2a";
    const metric=METRICS.find(m=>m.key===key);
    if(metric&&metric.lowerIsBetter) return diff<=0?"#0d2a1a":"#2a0d0d";
    return diff>=0?"#0d2a1a":"#2a0d0d";
  };
  const diffBorder=(diff,key)=>{
    if(diff===null)return"#333";
    const metric=METRICS.find(m=>m.key===key);
    if(metric&&metric.lowerIsBetter) return diff<=0?"#2ECC71":"#E74C3C";
    return diff>=0?"#2ECC71":"#E74C3C";
  };

  const startHold=id=>{holdTimer.current=setTimeout(()=>setOverlay(id),450);};
  const endHold=()=>clearTimeout(holdTimer.current);
  const markAllSetsDone=exId=>{const d=EX[exId];if(!d)return;setChecked(p=>({...p,[exId]:true}));if(d.sets.length>0){const u={};d.sets.forEach((_,si)=>{u[`${exId}_s${si}`]=true;});setRepChecked(p=>({...p,...u}));}};
  useEffect(()=>{if(workout.isRest)return;workout.exercises.forEach(ex=>{const d=EX[ex.id];if(!d||d.sets.length===0)return;if(d.sets.every((_,si)=>repChecked[`${ex.id}_s${si}`])&&!checked[ex.id])setChecked(p=>({...p,[ex.id]:true}));});},[repChecked]);

  const overlayEx=overlay?workout.exercises.find(e=>e.id===overlay):null;
  const tomorrowDay=DAYS[(dayIdx+1)%7];
  const tomorrowWorkout=runWeek?getRunWeekWorkout((dayIdx+1)%7):STRENGTH_WORKOUTS[tomorrowDay];

  // Nutrition totals (parsed directly from inputs)
  const totalCal=parseFloat(nutCal)||0;
  const totalProt=parseFloat(nutProt)||0;



  // Nutrition weekly data
  const getNutWeekData=wkNum=>{
    const wkStart=new Date(PROGRAM_START);
    wkStart.setDate(wkStart.getDate()+(wkNum-1)*7);
    const allNut=LS.get("ft_nut_all")||{};
    return Array.from({length:7},(_,i)=>{
      const d=new Date(wkStart);d.setDate(d.getDate()+i);
      const dk=dateKey(d);
      const entry=allNut[dk];
      return entry&&(entry.cal||entry.prot)?entry:null;
    });
  };

  // Run week time actuals helpers
  const DAY_TO_RUN_KEY={0:"sun",1:"mon",3:"wed",4:"thu",6:"sat"};
  const setRunTime=(wk,dk,val)=>setRunWeekActuals(p=>({...p,[wk]:{...(p[wk]||{}),[dk]:val===""?undefined:parseFloat(val)}}));
  const getRunDiff=(wk,dist,dk)=>{
    const actual=runWeekActuals[wk]?.[dk];
    if(actual===undefined)return null;
    const goal=getRunWeekGoal(dist,runWeekIndex(wk));
    return actual-goal; // negative = faster = green
  };

  // Strength weeks table data
  const strengthWeeks=STRENGTH_WEEKS;
  // Run weeks for run table
  const runWeeks=[4,8,12];

  const tipText=getDailyTip(currentWeek,dayIdx);

  return<div style={{minHeight:"100vh",background:"#0a0a12",fontFamily:"'IBM Plex Mono',monospace",color:"#e8e8f0"}}>
    {overlayEx&&<ExOverlay ex={overlayEx} color={workout.color} label={workout.label} repChecked={repChecked} onRepCheck={key=>setRepChecked(p=>({...p,[key]:!p[key]}))} onClose={()=>setOverlay(null)} onAllDone={markAllSetsDone} weekNum={currentWeek}/>}
    {showConfetti&&<Confetti/>}

    {/* Header */}

              </div>;

          {workout.exercises.length>0&&<>
            <div style={{fontSize:10,color:"#2a2a3a",textAlign:"center",marginBottom:16,letterSpacing:.5}}>Tap › for details + rest timer · hold to open</div>
            <div style={{marginBottom:24}}>
              <div style={{fontSize:11,color:"#666680",marginBottom:5}}>{doneCount} / {workout.exercises.length} complete</div>

            </div>

          {/* Push-up tracker */}

          </div>}
        </>}

        {/* Up Next */}
        <div style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderLeft:`3px solid ${tomorrowWorkout.color}`,borderRadius:12,padding:16,marginBottom:16}}>

          <div style={{fontSize:13,color:"#c8c8d8",lineHeight:1.7}}>{tipText}</div>
        </div>

      {/* ══ PROGRESS TAB ══ */}
      {tab==="progress"&&<div className="fade">
        {/* Week selector */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0f0f1e",border:"1px solid #1e1e35",borderRadius:10,padding:"12px 16px",marginBottom:18}}>
          <button onClick={()=>setCurrentWeek(w=>Math.max(1,w-1))} style={{background:"#1e1e35",border:"none",borderRadius:6,color:"#e8e8f0",width:36,height:36,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,letterSpacing:3,color:"#fff"}}>WEEK {currentWeek} <span style={{opacity:.4,fontSize:13,fontWeight:400}}>of 12</span></div>
            <div style={{fontSize:9,letterSpacing:2,color:isRunWeek(currentWeek)?"#3498DB":"#E67E22",marginTop:2}}>{isRunWeek(currentWeek)?"RUN WEEK":"STRENGTH WEEK"}</div>
          </div>
          <button onClick={()=>setCurrentWeek(w=>Math.min(12,w+1))} style={{background:"#1e1e35",border:"none",borderRadius:6,color:"#e8e8f0",width:36,height:36,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>

        {isRunWeek(currentWeek)?<>
          {/* RUN WEEK — daily time cards */}
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12}}>Week {currentWeek} Runs</div>
          {/* Row 1: Sun 6k, Mon 8k */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:10}}>
            {[{dk:"sun",dist:"6k",label:"Sunday"},{dk:"mon",dist:"8k",label:"Monday"}].map(({dk,dist,label})=>{
              const actual=runWeekActuals[currentWeek]?.[dk];
              const diff=getRunDiff(currentWeek,dist,dk);
              const goal=getRunWeekGoal(dist,runWeekIndex(currentWeek));
              return<div key={dk} style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderTop:"3px solid #3498DB",borderRadius:10,padding:14,display:"flex",flexDirection:"column",gap:6}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:700,letterSpacing:2,color:"#666"}}>{label} — {dist}</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:"#3498DB"}}>{goal}<span style={{fontSize:10,opacity:.5,marginLeft:3}}>min goal</span></div>
                <input type="number" placeholder="Actual (min)" value={actual??""} step="0.1"
                  onChange={e=>setRunTime(currentWeek,dk,e.target.value)}
                  style={{background:"#14142a",border:"1px solid #2a2a4a",borderRadius:6,padding:"7px 10px",color:"#e8e8f0",fontFamily:"'IBM Plex Mono',monospace",fontSize:16,width:"100%",outline:"none"}}/>
                <div style={{borderRadius:6,padding:"5px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,textAlign:"center",color:timeDiffColor(diff),background:timeDiffBg(diff),border:`1px solid ${timeDiffBorder(diff)}`}}>{fmtTimeDiff(diff)}</div>
              </div>;
            })}
          </div>
          {/* Row 2: Wed 10k centered */}
          {(()=>{const dk="wed",dist="10k",label="Wednesday",actual=runWeekActuals[currentWeek]?.wed,diff=getRunDiff(currentWeek,"10k","wed"),goal=getRunWeekGoal("10k",runWeekIndex(currentWeek));return<div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
            <div style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderTop:"3px solid #3498DB",borderRadius:10,padding:14,display:"flex",flexDirection:"column",gap:6,width:"calc(50% - 5px)"}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:700,letterSpacing:2,color:"#666"}}>{label} — {dist}</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:"#3498DB"}}>{goal}<span style={{fontSize:10,opacity:.5,marginLeft:3}}>min goal</span></div>
              <input type="number" placeholder="Actual (min)" value={actual??""} step="0.1"
                onChange={e=>setRunTime(currentWeek,"wed",e.target.value)}
                style={{background:"#14142a",border:"1px solid #2a2a4a",borderRadius:6,padding:"7px 10px",color:"#e8e8f0",fontFamily:"'IBM Plex Mono',monospace",fontSize:16,width:"100%",outline:"none"}}/>
              <div style={{borderRadius:6,padding:"5px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,textAlign:"center",color:timeDiffColor(diff),background:timeDiffBg(diff),border:`1px solid ${timeDiffBorder(diff)}`}}>{fmtTimeDiff(diff)}</div>
            </div>
          </div>;})()} 
          {/* Row 3: Thu 8k, Sat 6k */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:22}}>
            {[{dk:"thu",dist:"8k",label:"Thursday"},{dk:"sat",dist:"6k",label:"Saturday"}].map(({dk,dist,label})=>{
              const actual=runWeekActuals[currentWeek]?.[dk];
              const diff=getRunDiff(currentWeek,dist,dk);
              const goal=getRunWeekGoal(dist,runWeekIndex(currentWeek));
              return<div key={dk} style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderTop:"3px solid #3498DB",borderRadius:10,padding:14,display:"flex",flexDirection:"column",gap:6}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:700,letterSpacing:2,color:"#666"}}>{label} — {dist}</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:"#3498DB"}}>{goal}<span style={{fontSize:10,opacity:.5,marginLeft:3}}>min goal</span></div>
                <input type="number" placeholder="Actual (min)" value={actual??""} step="0.1"
                  onChange={e=>setRunTime(currentWeek,dk,e.target.value)}
                  style={{background:"#14142a",border:"1px solid #2a2a4a",borderRadius:6,padding:"7px 10px",color:"#e8e8f0",fontFamily:"'IBM Plex Mono',monospace",fontSize:16,width:"100%",outline:"none"}}/>
                <div style={{borderRadius:6,padding:"5px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,textAlign:"center",color:timeDiffColor(diff),background:timeDiffBg(diff),border:`1px solid ${timeDiffBorder(diff)}`}}>{fmtTimeDiff(diff)}</div>
              </div>;
            })}
          </div>

          {/* Run weeks table */}
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12}}>Run Weeks</div>
          <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #1e1e35",marginBottom:16}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr>
                <th style={{padding:"10px 6px",background:"#0f0f1e",fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:700,letterSpacing:2,textAlign:"center",borderBottom:"1px solid #1e1e35",color:"#aaaaaa"}}>Wk</th>
                {["6k Sun","8k Mon","10k Wed","8k Thu","6k Sat"].map(h=><th key={h} style={{padding:"10px 6px",background:"#0f0f1e",fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:700,letterSpacing:1,textAlign:"center",borderBottom:"1px solid #1e1e35",color:"#3498DB",whiteSpace:"nowrap"}}>{h}</th>)}
              </tr></thead>
              <tbody>{runWeeks.map(wk=>{

                  {[{dk:"sun",dist:"6k"},{dk:"mon",dist:"8k"},{dk:"wed",dist:"10k"},{dk:"thu",dist:"8k"},{dk:"sat",dist:"6k"}].map(({dk,dist})=>{
                    const actual=rwa[dk];
                    const diff=actual!==undefined?actual-getRunWeekGoal(dist,runWeekIndex(wk)):null;
                    return<td key={dk} style={{padding:"7px 6px",textAlign:"center",borderBottom:"1px solid #10101e"}}>
                      <div style={{fontSize:10,opacity:.4}}>{getRunWeekGoal(dist,runWeekIndex(wk))}</div>
                      {actual!==undefined&&<div style={{fontSize:12,fontWeight:700,color:timeDiffColor(diff)}}>{fmtTimeDiff(diff)}</div>}
                    </td>;

                </tr>;
              })}</tbody>
            </table>
          </div>

          {/* Pace graph */}
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12}}>Pace Graph</div>
          <PaceGraph runWeekActuals={runWeekActuals}/>

          {/* Strength weeks table */}
          <StrengthTable actuals={actuals} strengthWeeks={strengthWeeks} currentWeek={currentWeek} setCurrentWeek={setCurrentWeek} getDiff={getDiff} fmtDiff={fmtDiff} diffColor={diffColor} saveStatus={saveStatus}/>

          {/* Progress chart */}
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12,marginTop:8}}>Progress Chart</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:14}}>
            {METRICS.map(m=><button key={m.key} onClick={()=>setGraphMetric(m.key)} style={{padding:"8px 4px",borderRadius:8,border:`1px solid ${graphMetric===m.key?m.color:"#1e1e35"}`,background:graphMetric===m.key?m.color+"18":"#0f0f1e",color:graphMetric===m.key?m.color:"#666680",fontFamily:"'IBM Plex Mono',monospace",fontSize:10,fontWeight:600,cursor:"pointer",transition:"all .15s",display:"flex",flexDirection:"column",alignItems:"center",gap:3,boxShadow:graphMetric===m.key?`0 0 12px ${m.color}30`:"none"}}>
              <span style={{fontSize:12}}>{m.label}</span>
            </button>)}
          </div>
          {(()=>{
            const m=METRICS.find(x=>x.key===graphMetric);
            const swks=strengthWeeks;
            const gv=swks.map(w=>getGoal(graphMetric,w)||0);
            const av=swks.map(w=>actuals[w]?.[graphMetric]);
            const hasA=av.some(v=>v!==undefined);
            const all=[...gv,...av.filter(v=>v!==undefined)];
            const minV=Math.min(...all)*0.92,maxV=Math.max(...all)*1.05;
            const W=320,H=160,PL=36,PR=12,PT=12,PB=28,cW=W-PL-PR,cH=H-PT-PB;
            const xOf=i=>PL+(i/(swks.length-1))*cW,yOf=v=>PT+cH-((v-minV)/(maxV-minV))*cH;
            const gp=gv.map((v,i)=>`${i===0?"M":"L"}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(" ");
            const ap=av.map((v,i)=>v!==undefined?{x:xOf(i),y:yOf(v),v,i}:null).filter(Boolean);
            const al=ap.length>1?ap.map((p,j)=>`${j===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" "):null;
            const curIdx=swks.indexOf(currentWeek);
            return<div style={{background:"#0a0a16",borderRadius:12,border:"1px solid #1a1a2e",padding:"12px 8px 8px"}}>
              <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block",margin:"0 auto"}}>
                {Array.from({length:5},(_,i)=>{const v=minV+(maxV-minV)*(i/4),y=yOf(v);return<g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1a1a2e" strokeWidth="1"/><text x={PL-4} y={y+4} textAnchor="end" fill="#3a3a5a" fontSize="8" fontFamily="monospace">{v.toFixed(m.key==="run5k"||m.key==="weight"?1:0)}</text></g>;})}
                {swks.map((w,i)=><text key={w} x={xOf(i)} y={H-6} textAnchor="middle" fill="#3a3a5a" fontSize="8" fontFamily="monospace">W{w}</text>)}
                <path d={gp} fill="none" stroke={m.color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.45"/>
                {gv.map((v,i)=><circle key={i} cx={xOf(i)} cy={yOf(v)} r="2.5" fill="#0a0a16" stroke={m.color} strokeWidth="1.5" opacity="0.5"/>)}
                {al&&<path d={al} fill="none" stroke={m.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
                {ap.map(p=><g key={p.i}><circle cx={p.x} cy={p.y} r="4" fill={m.color} stroke="#0a0a16" strokeWidth="1.5"/><text x={p.x} y={p.y-8} textAnchor="middle" fill={m.color} fontSize="8" fontFamily="monospace" fontWeight="bold">{p.v.toFixed(m.key==="run5k"||m.key==="weight"?1:0)}</text></g>)}
                {curIdx>=0&&<line x1={xOf(curIdx)} y1={PT} x2={xOf(curIdx)} y2={H-PB} stroke="#E67E22" strokeWidth="1" strokeDasharray="2,2" opacity="0.4"/>}
              </svg>
              <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6}}>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#666680"}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={m.color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.5"/></svg>Goal</div>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:m.color}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={m.color} strokeWidth="2.5"/></svg>Actual</div>
              </div>
              {!hasA&&<div style={{textAlign:"center",fontSize:10,color:"#55556a",marginTop:6}}>Log actuals to see your progress line</div>}
            </div>;
          })()}

        </>:<>
          {/* STRENGTH WEEK — metric cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:22}}>
            {METRICS.map(m=>{
              const goal=getGoal(m.key,currentWeek);
              const actual=actuals[currentWeek]?.[m.key];
              const diff=getDiff(currentWeek,m.key);
              if(goal===null)return null;
              return<div key={m.key} style={{background:"#0f0f1e",border:"1px solid #1e1e35",borderTop:`3px solid ${m.color}`,borderRadius:10,padding:14,display:"flex",flexDirection:"column",gap:6}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,letterSpacing:2,color:"#666"}}>{m.label}</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:m.color}}>{goal}<span style={{fontSize:11,opacity:.5,marginLeft:4}}>{m.unit}</span></div>
                <input type="number" placeholder={m.key==="weight"?"Morning wt":m.key==="run5k"?"Time (min)":"Actual"} value={actual??""} step={m.key==="run5k"||m.key==="weight"?"0.1":"1"}
                  onChange={e=>setActualFn(currentWeek,m.key,e.target.value)}
                  style={{background:"#14142a",border:"1px solid #2a2a4a",borderRadius:6,padding:"7px 10px",color:"#e8e8f0",fontFamily:"'IBM Plex Mono',monospace",fontSize:16,width:"100%",outline:"none"}}/>
                <div style={{borderRadius:6,padding:"5px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,letterSpacing:1,textAlign:"center",color:diffColor(diff,m.key),background:diffBg(diff,m.key),border:`1px solid ${diffBorder(diff,m.key)}`}}>{fmtDiff(diff,m.key)}{diff!==null&&<span style={{fontSize:10,marginLeft:3,opacity:.7}}>{m.unit}</span>}</div>
              </div>;
            })}
          </div>

          {/* Strength weeks table */}
          <StrengthTable actuals={actuals} strengthWeeks={strengthWeeks} currentWeek={currentWeek} setCurrentWeek={setCurrentWeek} getDiff={getDiff} fmtDiff={fmtDiff} diffColor={diffColor} saveStatus={saveStatus}/>

          {/* Progress chart - moved above run weeks */}
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12}}>Progress Chart</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:14}}>
            {METRICS.map(m=><button key={m.key} onClick={()=>setGraphMetric(m.key)} style={{padding:"8px 4px",borderRadius:8,border:`1px solid ${graphMetric===m.key?m.color:"#1e1e35"}`,background:graphMetric===m.key?m.color+"18":"#0f0f1e",color:graphMetric===m.key?m.color:"#666680",fontFamily:"'IBM Plex Mono',monospace",fontSize:10,fontWeight:600,cursor:"pointer",transition:"all .15s",display:"flex",flexDirection:"column",alignItems:"center",gap:3,boxShadow:graphMetric===m.key?`0 0 12px ${m.color}30`:"none"}}>
              <span style={{fontSize:12}}>{m.label}</span>
            </button>)}
          </div>
          {(()=>{
            const m=METRICS.find(x=>x.key===graphMetric);
            const swks=strengthWeeks;
            const gv=swks.map(w=>getGoal(graphMetric,w)||0);
            const av=swks.map(w=>actuals[w]?.[graphMetric]);
            const hasA=av.some(v=>v!==undefined);
            const all=[...gv,...av.filter(v=>v!==undefined)];
            const minV=Math.min(...all)*0.92,maxV=Math.max(...all)*1.05;
            const W=320,H=160,PL=36,PR=12,PT=12,PB=28,cW=W-PL-PR,cH=H-PT-PB;
            const xOf=i=>PL+(i/(swks.length-1))*cW,yOf=v=>PT+cH-((v-minV)/(maxV-minV))*cH;
            const gp=gv.map((v,i)=>`${i===0?"M":"L"}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(" ");
            const ap=av.map((v,i)=>v!==undefined?{x:xOf(i),y:yOf(v),v,i}:null).filter(Boolean);
            const al=ap.length>1?ap.map((p,j)=>`${j===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" "):null;
            const curIdx=swks.indexOf(currentWeek);
            return<div style={{background:"#0a0a16",borderRadius:12,border:"1px solid #1a1a2e",padding:"12px 8px 8px",marginBottom:24}}>
              <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block",margin:"0 auto"}}>
                {Array.from({length:5},(_,i)=>{const v=minV+(maxV-minV)*(i/4),y=yOf(v);return<g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1a1a2e" strokeWidth="1"/><text x={PL-4} y={y+4} textAnchor="end" fill="#3a3a5a" fontSize="8" fontFamily="monospace">{v.toFixed(m.key==="run5k"||m.key==="weight"?1:0)}</text></g>;})}
                {swks.map((w,i)=><text key={w} x={xOf(i)} y={H-6} textAnchor="middle" fill="#3a3a5a" fontSize="8" fontFamily="monospace">W{w}</text>)}
                <path d={gp} fill="none" stroke={m.color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.45"/>
                {gv.map((v,i)=><circle key={i} cx={xOf(i)} cy={yOf(v)} r="2.5" fill="#0a0a16" stroke={m.color} strokeWidth="1.5" opacity="0.5"/>)}
                {al&&<path d={al} fill="none" stroke={m.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
                {ap.map(p=><g key={p.i}><circle cx={p.x} cy={p.y} r="4" fill={m.color} stroke="#0a0a16" strokeWidth="1.5"/><text x={p.x} y={p.y-8} textAnchor="middle" fill={m.color} fontSize="8" fontFamily="monospace" fontWeight="bold">{p.v.toFixed(m.key==="run5k"||m.key==="weight"?1:0)}</text></g>)}
                {curIdx>=0&&<line x1={xOf(curIdx)} y1={PT} x2={xOf(curIdx)} y2={H-PB} stroke="#E67E22" strokeWidth="1" strokeDasharray="2,2" opacity="0.4"/>}
              </svg>
              <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6}}>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#666680"}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={m.color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.5"/></svg>Goal</div>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:m.color}}><svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={m.color} strokeWidth="2.5"/></svg>Actual</div>
              </div>
              {!hasA&&<div style={{textAlign:"center",fontSize:10,color:"#55556a",marginTop:6}}>Log actuals to see your progress line</div>}
            </div>;
          })()}

          {/* Run weeks table */}
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12,marginTop:8}}>Run Weeks</div>
          <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #1e1e35",marginBottom:24}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr>
                <th style={{padding:"10px 6px",background:"#0f0f1e",fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:700,letterSpacing:2,textAlign:"center",borderBottom:"1px solid #1e1e35",color:"#aaaaaa"}}>Wk</th>
                {["6k Sun","8k Mon","10k Wed","8k Thu","6k Sat"].map(h=><th key={h} style={{padding:"10px 6px",background:"#0f0f1e",fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:700,letterSpacing:1,textAlign:"center",borderBottom:"1px solid #1e1e35",color:"#3498DB",whiteSpace:"nowrap"}}>{h}</th>)}
              </tr></thead>
              <tbody>{runWeeks.map(wk=>{
                const rwa=runWeekActuals[wk]||{};
                return<tr key={wk} className="row-hover" style={{background:"transparent",cursor:"pointer"}} onClick={()=>setCurrentWeek(wk)}>
                  <td style={{padding:"7px 6px",textAlign:"center",borderBottom:"1px solid #10101e",color:"#aaaaaa"}}>W{wk}</td>
                  {[{dk:"sun",dist:"6k"},{dk:"mon",dist:"8k"},{dk:"wed",dist:"10k"},{dk:"thu",dist:"8k"},{dk:"sat",dist:"6k"}].map(({dk,dist})=>{
                    const actual=rwa[dk];
                    const diff=actual!==undefined?actual-getRunWeekGoal(dist,runWeekIndex(wk)):null;
                    return<td key={dk} style={{padding:"7px 6px",textAlign:"center",borderBottom:"1px solid #10101e"}}>
                      <div style={{fontSize:10,opacity:.4}}>{getRunWeekGoal(dist,runWeekIndex(wk))}</div>
                      {actual!==undefined&&<div style={{fontSize:12,fontWeight:700,color:timeDiffColor(diff)}}>{fmtTimeDiff(diff)}</div>}
                    </td>;
                  })}
                </tr>;
              })}</tbody>
            </table>
          </div>

          {/* Pace graph */}
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12}}>Pace Graph</div>
          <PaceGraph runWeekActuals={runWeekActuals}/>

        </>}
      </div>}

      {/* ══ NUTRITION TAB ══ */}
      {tab==="nutrition"&&<div className="fade">


        {/* Day selector */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0f0f1e",border:"1px solid #1e1e35",borderRadius:10,padding:"10px 14px",marginBottom:16}}>
          <button onClick={()=>{const d=new Date(nutDay);d.setDate(d.getDate()-1);setNutDay(dateKey(d));}}
            style={{background:"#1e1e35",border:"none",borderRadius:6,color:"#e8e8f0",width:32,height:32,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#fff"}}>
              {nutDay===todayKey?"Today":nutDay===dateKey(new Date(Date.now()-86400000))?"Yesterday":new Date(nutDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
            </div>
            {nutDay!==todayKey&&<button onClick={()=>setNutDay(todayKey)} style={{background:"transparent",border:"none",color:"#E67E22",fontFamily:"'IBM Plex Mono',monospace",fontSize:10,cursor:"pointer",marginTop:2}}>back to today</button>}
          </div>
          <button onClick={()=>{const d=new Date(nutDay);d.setDate(d.getDate()+1);const next=dateKey(d);if(next<=todayKey)setNutDay(next);}}
            style={{background:"#1e1e35",border:"none",borderRadius:6,color:nutDay>=todayKey?"#333":"#e8e8f0",width:32,height:32,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>

        {/* Daily totals input */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
          {[{label:"CALORIES TODAY",val:nutCal,set:setNutCal,color:"#3498DB",unit:"kcal",goal:CAL_GOAL},{label:"PROTEIN TODAY",val:nutProt,set:setNutProt,color:"#E67E22",unit:"g",goal:PROT_GOAL}].map(f=>(
            <div key={f.label} style={{background:"#0f0f1e",border:`1px solid ${f.color}33`,borderTop:`3px solid ${f.color}`,borderRadius:10,padding:14}}>
              <div style={{fontSize:9,letterSpacing:2,color:"#666",fontWeight:600,marginBottom:8}}>{f.label}</div>
              <input type="number" value={f.val} onChange={e=>{f.set(e.target.value);}} placeholder={f.unit}
                style={{width:"100%",background:"#0a0a18",border:`1px solid ${f.color}44`,borderRadius:6,padding:"8px 10px",color:"#e8e8f0",fontFamily:"'IBM Plex Mono',monospace",fontSize:16,outline:"none",marginBottom:8}}/>
              <div style={{fontSize:10,color:"#555"}}>{f.goal} {f.unit} goal</div>
              <div style={{height:3,background:"#1a1a2e",borderRadius:2,overflow:"hidden",marginTop:6}}>
                <div style={{height:"100%",borderRadius:2,background:parseFloat(f.val||0)>f.goal?"#E74C3C":f.color,width:`${Math.min(100,(parseFloat(f.val||0)/f.goal)*100)}%`,transition:"width .3s ease"}}/>
              </div>
            </div>
          ))}
        </div>

        {/* Weekly graph */}
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase",marginBottom:12}}>Weekly Nutrition</div>
        <NutritionGraph weekData={getNutWeekData(currentWeek)} weekLabel={`Week ${currentWeek}`} isCurrent={true}/>
        {currentWeek>1&&<div style={{marginTop:16}}>
          <div style={{fontSize:9,letterSpacing:2,color:"#444",fontWeight:600,marginBottom:10}}>PREVIOUS WEEKS</div>
          {Array.from({length:Math.min(3,currentWeek-1)},(_,i)=>currentWeek-1-i).map(w=><NutritionGraph key={w} weekData={getNutWeekData(w)} weekLabel={`Week ${w}`} isCurrent={false}/>)}
        </div>}
      </div>}

    </div>
  </div>;
}

// ── Strength table extracted as component ─────────────────────────────────────
function StrengthTable({actuals,strengthWeeks,currentWeek,setCurrentWeek,getDiff,fmtDiff,diffColor,saveStatus}){
  return<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:3,color:"#55556a",textTransform:"uppercase"}}>Strength Weeks</div>
      <div style={{fontSize:10,color:saveStatus==="saved"?"#2ECC71":"#55556a",transition:"color .3s",fontFamily:"'IBM Plex Mono',monospace"}}>{saveStatus==="saving"&&"saving"}{saveStatus==="saved"&&"saved"}</div>
    </div>
    <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #1e1e35",marginBottom:8}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <thead><tr>
          <th style={{padding:"10px 6px",background:"#0f0f1e",fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:700,letterSpacing:2,textAlign:"center",borderBottom:"1px solid #1e1e35",color:"#aaaaaa"}}>Wk</th>
          {METRICS.map(m=><th key={m.key} style={{padding:"10px 6px",background:"#0f0f1e",fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:700,letterSpacing:1,textAlign:"center",borderBottom:"1px solid #1e1e35",color:m.color,whiteSpace:"nowrap"}}>
            {m.key==="legraises"?"Legs":m.key==="pushups"?"Push":m.key==="pullups"?"Pull":m.key==="weight"?"Wt":m.key==="dips"?"Dips":"5k"}
          </th>)}
        </tr></thead>
        <tbody>{strengthWeeks.map(wk=><tr key={wk} className="row-hover" style={{background:wk===currentWeek?"#0f0f22":"transparent",cursor:"pointer"}} onClick={()=>setCurrentWeek(wk)}>
          <td style={{padding:"7px 6px",textAlign:"center",borderBottom:"1px solid #10101e",color:wk===currentWeek?"#E67E22":"#aaaaaa",fontWeight:wk===currentWeek?700:400}}>W{wk}</td>
          {METRICS.map(m=>{
            const diff=getDiff(wk,m.key),actual=actuals[wk]?.[m.key];
            return<td key={m.key} style={{padding:"7px 6px",textAlign:"center",borderBottom:"1px solid #10101e"}}>
              <div style={{fontSize:10,opacity:.4}}>{getGoal(m.key,wk)}</div>
              {actual!==undefined&&<div style={{fontSize:12,fontWeight:700,color:diffColor(diff,m.key)}}>{fmtDiff(diff,m.key)}</div>}
            </td>;
          })}
        </tr>)}</tbody>
      </table>
    </div>
    <div style={{fontSize:11,color:"#666680",marginBottom:24,textAlign:"center"}}>Tap any row to jump to that week</div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
